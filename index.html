<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BOX3.0 — ניהול משק בית</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--card:#1e1e32;--card2:#252540;
  --primary:#4338ca;--pl:#6d66e8;
  --green:#00b894;--red:#e17055;--blue:#0984e3;--amber:#f59e0b;--purple:#a855f7;
  --text:#f0f0ff;--text2:#a0a0c0;--text3:#606080;
  --border:rgba(255,255,255,.07);--radius:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;padding-bottom:80px}
.screen::-webkit-scrollbar{display:none}
.topbar{background:linear-gradient(160deg,#1a1040,#2d1f6e 60%,#4338ca);padding:14px 18px 20px;color:#fff}
.topbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:8px 0 12px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.4;transition:opacity .2s}
.nav-item.active{opacity:1}
.nav-item .ni{font-size:22px}
.nav-item .nl{font-size:10px;font-weight:600;color:var(--pl)}
.nav-item:not(.active) .nl{color:var(--text3)}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.pad{padding:16px}
.sec{padding:0 14px;margin-bottom:14px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-hdr h2{font-size:14px;font-weight:700}
.sec-hdr a{font-size:12px;color:var(--pl);cursor:pointer}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.kpi{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;cursor:pointer}
.kpi-icon{font-size:22px;margin-bottom:6px}
.kpi-lbl{font-size:11px;color:var(--text2);font-weight:500}
.kpi-val{font-size:22px;font-weight:800;letter-spacing:-.5px;margin:3px 0}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px}
.txn{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border)}
.txn:last-child{border-bottom:none}
.txn-ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.txn-name{font-size:13px;font-weight:600}
.txn-sub{font-size:11px;color:var(--text2);margin-top:1px}
.txn-amt{font-size:14px;font-weight:800;text-align:left}
.txn-date{font-size:10px;color:var(--text3);text-align:left}
.empty{text-align:center;padding:36px 20px;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:12px;line-height:1.6}
.fab{width:calc(100% - 28px);margin:0 14px;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:11px;color:var(--text2);width:72px;text-align:right;font-weight:500}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.bar-amt{font-size:11px;color:var(--text2);width:60px;text-align:left}
.tabs{display:flex;background:var(--card);border-radius:12px;padding:4px;gap:4px;margin-bottom:12px}
.tab{flex:1;padding:8px;border-radius:9px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:inherit;color:var(--text2);background:transparent;transition:all .2s}
.tab.active{background:var(--primary);color:#fff}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.chip.active{background:var(--primary);color:#fff}
.chip:not(.active){background:var(--card2);color:var(--text2)}
.search{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:12px;padding:10px 14px;margin-bottom:12px;border:1px solid var(--border)}
.search input{border:none;outline:none;font-family:inherit;font-size:13px;flex:1;color:var(--text);background:transparent;direction:rtl}
.search input::placeholder{color:var(--text3)}
.budget-item{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer}
.bi-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bi-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bi-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:6px}
.bi-fill{height:100%;border-radius:3px;transition:width .8s ease}
.fund-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer}
.fc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fc-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fc-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding-top:10px;border-top:1px solid var(--border)}
.fcd{text-align:center}
.fcd-val{font-size:12px;font-weight:700}
.fcd-lbl{font-size:10px;color:var(--text2);margin-top:1px}
.ins-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.ins-row:last-child{border-bottom:none}
.ins-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:12px}
.insight{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;gap:10px}
.ins-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;margin-top:4px}
.retire-box{background:rgba(0,0,0,.25);border-radius:14px;padding:14px;margin-top:4px}
.retire-row{display:flex;justify-content:space-between;margin-bottom:10px}
.retire-track{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin:8px 0}
.retire-fill{height:100%;background:linear-gradient(90deg,#36d399,#3abff8);border-radius:4px;transition:width 1.2s ease}
.slider-wrap{margin-bottom:14px}
.slider-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.slider-lbl span:last-child{font-weight:700;color:var(--pl)}
input[type=range]{width:100%;accent-color:var(--pl)}
.proj-result{background:linear-gradient(135deg,#0f1a2e,#1e4976);border-radius:12px;padding:14px;text-align:center;margin-top:8px;border:1px solid rgba(59,191,248,.2)}
.alert-box{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:12px 14px;display:flex;gap:10px;margin-bottom:12px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;padding:20px 18px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal::-webkit-scrollbar{display:none}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;letter-spacing:.3px;display:block}
.modal-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;direction:rtl;-webkit-appearance:none;margin-bottom:4px}
.modal-input:focus{border-color:var(--pl)}
.modal-select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none;direction:rtl;-webkit-appearance:none}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-cancel{flex:1;background:var(--card2);color:var(--text2);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-save{flex:2;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.modal-delete{width:100%;background:rgba(225,112,85,.15);color:#e17055;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.nk{padding:17px 0;text-align:center;font-size:20px;font-weight:600;cursor:pointer;border-left:1px solid var(--border);border-bottom:1px solid var(--border);user-select:none;transition:background .1s;color:var(--text)}
.nk:active{background:var(--card2)}
.nk:nth-child(3n+1){border-left:none}
.nk.spec{color:var(--pl);font-size:14px}
.amount-big{text-align:center;padding:16px;font-size:42px;font-weight:800;letter-spacing:-2px;min-height:68px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 4px;border-radius:12px;border:2px solid transparent;transition:all .15s;background:transparent}
.cat-btn.sel{border-color:var(--pl);background:rgba(109,102,232,.12)}
.cat-btn-ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px}
.cat-btn-lbl{font-size:10px;font-weight:600;color:var(--text2);text-align:center}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
</style>
</head>
<body>
<div class="app">
  <div class="screen" id="s-dash" style="display:block"></div>
  <div class="screen" id="s-exp" style="display:none"></div>
  <div class="screen" id="s-budget" style="display:none"></div>
  <div class="screen" id="s-pension" style="display:none"></div>
  <div class="screen" id="s-reports" style="display:none"></div>

  <nav class="navbar">
    <div class="nav-item active" onclick="nav('dash',this)"><div class="ni">🏠</div><div class="nl">ראשי</div></div>
    <div class="nav-item" onclick="nav('exp',this)"><div class="ni">💸</div><div class="nl">הוצאות</div></div>
    <div class="nav-item" onclick="nav('budget',this)"><div class="ni">🎯</div><div class="nl">תקציב</div></div>
    <div class="nav-item" onclick="nav('pension',this)"><div class="ni">🏛️</div><div class="nl">פנסיה</div></div>
    <div class="nav-item" onclick="nav('reports',this)"><div class="ni">📊</div><div class="nl">דוחות</div></div>
  </nav>

  <!-- EXPENSE MODAL -->
  <div class="modal-overlay" id="m-exp">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">הוצאה חדשה</div>
      <div class="amount-big"><span style="font-size:24px;opacity:.5">₪</span><span id="exp-num">0</span></div>
      <div class="numpad-grid" id="numpad"></div>
      <div style="margin-bottom:12px">
        <label class="modal-label">שם / תיאור</label>
        <input class="modal-input" id="exp-name" type="text" placeholder="למשל: שופרסל, תדלוק...">
      </div>
      <div style="margin-bottom:12px">
        <label class="modal-label">קטגוריה</label>
        <div class="cat-grid" id="cat-grid"></div>
      </div>
      <div style="margin-bottom:4px">
        <label class="modal-label">אמצעי תשלום</label>
        <select class="modal-select" id="exp-src">
          <option>מזומן</option><option>לאומי</option><option>מקס</option><option>ישראכרט</option><option>אחר</option>
        </select>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeM('m-exp')">ביטול</button>
        <button class="modal-save" onclick="saveExp()">שמור הוצאה</button>
      </div>
    </div>
  </div>

  <!-- INCOME MODAL -->
  <div class="modal-overlay" id="m-inc">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">הכנסה חדשה</div>
      <label class="modal-label">סכום (₪)</label>
      <input class="modal-input" id="inc-amt" type="number" placeholder="0" inputmode="numeric">
      <label class="modal-label" style="margin-top:10px">מקור</label>
      <input class="modal-input" id="inc-src" type="text" placeholder="משכורת, פרילנס, אחר...">
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeM('m-inc')">ביטול</button>
        <button class="modal-save" onclick="saveInc()">שמור</button>
      </div>
    </div>
  </div>

  <!-- BUDGET MODAL -->
  <div class="modal-overlay" id="m-budget">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title" id="bm-title">תקציב קטגוריה</div>
      <label class="modal-label">תקציב חודשי (₪)</label>
      <input class="modal-input" id="bm-amt" type="number" placeholder="0" inputmode="numeric">
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeM('m-budget')">ביטול</button>
        <button class="modal-save" onclick="saveBudget()">שמור</button>
      </div>
    </div>
  </div>

  <!-- FUND MODAL -->
  <div class="modal-overlay" id="m-fund">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title" id="fm-title">קרן / חיסכון</div>
      <label class="modal-label">שם הקרן</label>
      <input class="modal-input" id="fm-name" type="text" placeholder="למשל: קרן פנסיה מנורה">
      <label class="modal-label" style="margin-top:10px">חברה מנהלת</label>
      <input class="modal-input" id="fm-company" type="text" placeholder="מנורה, הראל, מיטב...">
      <label class="modal-label" style="margin-top:10px">סוג</label>
      <select class="modal-select" id="fm-type">
        <option>קרן פנסיה</option><option>קרן השתלמות</option><option>קופת גמל</option><option>ביטוח מנהלים</option><option>חיסכון אחר</option>
      </select>
      <label class="modal-label" style="margin-top:10px">יתרה נוכחית (₪)</label>
      <input class="modal-input" id="fm-balance" type="number" placeholder="0" inputmode="numeric">
      <label class="modal-label" style="margin-top:10px">הפרשה חודשית (₪)</label>
      <input class="modal-input" id="fm-monthly" type="number" placeholder="0" inputmode="numeric">
      <label class="modal-label" style="margin-top:10px">תשואה שנתית (%)</label>
      <input class="modal-input" id="fm-return" type="number" placeholder="0" step="0.1" inputmode="decimal">
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeM('m-fund')">ביטול</button>
        <button class="modal-save" onclick="saveFund()">שמור</button>
      </div>
      <button class="modal-delete" id="fm-delete" onclick="deleteFund()" style="display:none">מחק קרן</button>
    </div>
  </div>

  <!-- INSURANCE MODAL -->
  <div class="modal-overlay" id="m-ins">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title" id="im-title">ביטוח</div>
      <label class="modal-label">סוג ביטוח</label>
      <select class="modal-select" id="im-type">
        <option>ביטוח חיים</option><option>ביטוח בריאות</option><option>ביטוח סיעוד</option><option>ביטוח דירה</option><option>ביטוח רכב</option><option>אחר</option>
      </select>
      <label class="modal-label" style="margin-top:10px">חברת ביטוח</label>
      <input class="modal-input" id="im-company" type="text" placeholder="כלל, הפניקס, מגדל...">
      <label class="modal-label" style="margin-top:10px">פרמיה חודשית (₪)</label>
      <input class="modal-input" id="im-premium" type="number" placeholder="0" inputmode="numeric">
      <label class="modal-label" style="margin-top:10px">כיסוי / פרטים</label>
      <input class="modal-input" id="im-coverage" type="text" placeholder="סכום כיסוי, תאריך חידוש...">
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeM('m-ins')">ביטול</button>
        <button class="modal-save" onclick="saveIns()">שמור</button>
      </div>
      <button class="modal-delete" id="im-delete" onclick="deleteIns()" style="display:none">מחק ביטוח</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>
<script>
const CATS=[
  {n:'מזון',ic:'🛒',c:'#00b894',bg:'rgba(0,184,148,.15)'},
  {n:'רכב',ic:'🚗',c:'#0984e3',bg:'rgba(9,132,227,.15)'},
  {n:'בילוי',ic:'🍕',c:'#e17055',bg:'rgba(225,112,85,.15)'},
  {n:'בריאות',ic:'💊',c:'#a855f7',bg:'rgba(168,85,247,.15)'},
  {n:'תקשורת',ic:'📱',c:'#6d66e8',bg:'rgba(109,102,232,.2)'},
  {n:'ביגוד',ic:'👗',c:'#f59e0b',bg:'rgba(245,158,11,.15)'},
  {n:'דיור',ic:'🏠',c:'#f59e0b',bg:'rgba(245,158,11,.15)'},
  {n:'חינוך',ic:'📚',c:'#0984e3',bg:'rgba(9,132,227,.15)'},
  {n:'טיפוח',ic:'💈',c:'#a855f7',bg:'rgba(168,85,247,.15)'},
  {n:'שירותים',ic:'💡',c:'#606080',bg:'rgba(96,96,128,.15)'},
  {n:'תחבורה',ic:'🚕',c:'#0984e3',bg:'rgba(9,132,227,.15)'},
  {n:'אחר',ic:'📦',c:'#606080',bg:'rgba(96,96,128,.15)'},
];
const FUND_ICONS={'קרן פנסיה':'🏛️','קרן השתלמות':'📈','קופת גמל':'🏦','ביטוח מנהלים':'💼','חיסכון אחר':'💰'};
const FUND_BG={'קרן פנסיה':'rgba(9,132,227,.15)','קרן השתלמות':'rgba(0,184,148,.15)','קופת גמל':'rgba(168,85,247,.15)','ביטוח מנהלים':'rgba(245,158,11,.15)','חיסכון אחר':'rgba(109,102,232,.15)'};
const FUND_C={'קרן פנסיה':'#0984e3','קרן השתלמות':'#00b894','קופת גמל':'#a855f7','ביטוח מנהלים':'#f59e0b','חיסכון אחר':'#6d66e8'};
const INS_ICONS={'ביטוח חיים':'❤️','ביטוח בריאות':'🏥','ביטוח סיעוד':'🦽','ביטוח דירה':'🏠','ביטוח רכב':'🚗','אחר':'📋'};
const INS_BG={'ביטוח חיים':'rgba(225,112,85,.15)','ביטוח בריאות':'rgba(0,184,148,.15)','ביטוח סיעוד':'rgba(168,85,247,.15)','ביטוח דירה':'rgba(245,158,11,.15)','ביטוח רכב':'rgba(9,132,227,.15)','אחר':'rgba(96,96,128,.15)'};
const MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function ld(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v))}
let txns=ld('txns',[]);
let incomes=ld('incomes',[]);
let budgets=ld('budgets',CATS.map(c=>({n:c.n,budget:0})));
let funds=ld('funds',[]);
let insurances=ld('insurances',[]);

function nav(name,el){
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('s-'+name).style.display='block';
  el.classList.add('active');
  const builders={dash:buildDash,exp:buildExp,budget:buildBudget,pension:buildPension,reports:buildReports};
  builders[name]&&builders[name]();
}
function closeM(id){document.getElementById(id).classList.remove('show')}
function openM(id){document.getElementById(id).classList.add('show')}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.classList.remove('show'),2500)}

// NUMPAD
let expAmt='';
const npEl=document.getElementById('numpad');
['7','8','9','4','5','6','1','2','3','.','0','⌫'].forEach(k=>{
  const d=document.createElement('div');
  d.className='nk'+(k==='⌫'||k==='.'?' spec':'');
  d.textContent=k;
  d.onclick=()=>{
    if(k==='⌫')expAmt=expAmt.slice(0,-1);
    else if(k==='.'){if(!expAmt.includes('.'))expAmt+=k}
    else if(expAmt.length<8)expAmt+=k;
    document.getElementById('exp-num').textContent=expAmt||'0';
  };
  npEl.appendChild(d);
});

// CAT GRID
let selCat=CATS[0].n;
const cgEl=document.getElementById('cat-grid');
CATS.forEach(c=>{
  const d=document.createElement('div');
  d.className='cat-btn'+(c.n===selCat?' sel':'');
  d.innerHTML=`<div class="cat-btn-ic" style="background:${c.bg}">${c.ic}</div><div class="cat-btn-lbl">${c.n}</div>`;
  d.onclick=()=>{selCat=c.n;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));d.classList.add('sel')};
  cgEl.appendChild(d);
});

function saveExp(){
  const amt=parseFloat(expAmt);
  const name=document.getElementById('exp-name').value.trim();
  if(!amt||amt<=0)return toast('הכנס סכום',1);
  if(!name)return toast('הכנס שם',1);
  const cat=CATS.find(c=>c.n===selCat)||CATS[0];
  txns.unshift({id:Date.now(),name,amt,cat:cat.n,ic:cat.ic,bg:cat.bg,c:cat.c,src:document.getElementById('exp-src').value,date:new Date().toLocaleDateString('he-IL')});
  sv('txns',txns);expAmt='';
  document.getElementById('exp-num').textContent='0';
  document.getElementById('exp-name').value='';
  closeM('m-exp');buildDash();toast('הוצאה נשמרה ✓');
}
function saveInc(){
  const amt=parseFloat(document.getElementById('inc-amt').value);
  if(!amt||amt<=0)return toast('הכנס סכום',1);
  incomes.unshift({id:Date.now(),amt,src:document.getElementById('inc-src').value.trim()||'הכנסה',date:new Date().toLocaleDateString('he-IL')});
  sv('incomes',incomes);document.getElementById('inc-amt').value='';document.getElementById('inc-src').value='';
  closeM('m-inc');buildDash();toast('הכנסה נשמרה ✓');
}

// DASHBOARD
function buildDash(){
  const el=document.getElementById('s-dash');
  const now=new Date();const m=now.getMonth();const y=now.getFullYear();
  const mt=txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y});
  const mi=incomes.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y});
  const totE=mt.reduce((s,t)=>s+t.amt,0);
  const totI=mi.reduce((s,t)=>s+t.amt,0);
  const saving=totI-totE;
  const cats={};mt.forEach(t=>{cats[t.cat]=(cats[t.cat]||0)+t.amt});
  const topC=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxC=topC[0]?.[1]||1;
  el.innerHTML=`
  <div class="topbar">
    <div class="topbar-row">
      <div><div style="font-size:13px;opacity:.65">BOX3.0</div><div style="font-size:18px;font-weight:800">${MONTHS[m]} ${y} 👋</div></div>
      <div style="font-size:11px;opacity:.55">יום ${now.getDate()} לחודש</div>
    </div>
  </div>
  <div class="kpi-grid">
    <div class="kpi" onclick="openM('m-inc')">
      <div class="kpi-icon">💰</div><div class="kpi-lbl">הכנסות</div>
      <div class="kpi-val" style="color:#00b894">${totI>0?'₪'+totI.toLocaleString():'—'}</div>
      <div class="kpi-sub">+ הוסף הכנסה</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">💸</div><div class="kpi-lbl">הוצאות</div>
      <div class="kpi-val" style="color:#e17055">${totE>0?'₪'+totE.toLocaleString():'—'}</div>
      <div class="kpi-sub">${mt.length} עסקאות</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">🏦</div><div class="kpi-lbl">חיסכון</div>
      <div class="kpi-val" style="color:${saving>=0?'#0984e3':'#e17055'}">${totI>0||totE>0?'₪'+saving.toLocaleString():'—'}</div>
      <div class="kpi-sub">${totI>0?Math.round(saving/totI*100)+'% מההכנסה':''}</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">📅</div><div class="kpi-lbl">ממוצע יומי</div>
      <div class="kpi-val" style="color:#a855f7">${totE>0?'₪'+Math.round(totE/now.getDate()).toLocaleString():'—'}</div>
      <div class="kpi-sub">הוצאות בלבד</div>
    </div>
  </div>
  ${topC.length?`<div class="sec"><div class="sec-hdr"><h2>לפי קטגוריה</h2></div><div class="card pad">
    ${topC.map(([cat,amt])=>{const c=CATS.find(x=>x.n===cat)||{c:'#6d66e8'};return`<div class="bar-row"><div class="bar-lbl">${cat}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxC*100)}%;background:${c.c}"></div></div><div class="bar-amt">₪${amt.toLocaleString()}</div></div>`;}).join('')}
  </div></div>`:`<div class="sec"><div class="card"><div class="empty"><div class="empty-icon">📊</div><div class="empty-title">ברוך הבא ל-BOX3.0</div><div class="empty-sub">הוסף הוצאה ראשונה<br>כדי להתחיל לעקוב</div></div></div></div>`}
  ${txns.length?`<div class="sec"><div class="sec-hdr"><h2>עסקאות אחרונות</h2><a onclick="document.querySelectorAll('.nav-item')[1].click()">הכל ›</a></div><div class="card">
    ${txns.slice(0,5).map(t=>`<div class="txn"><div class="txn-ic" style="background:${t.bg}">${t.ic}</div><div style="flex:1"><div class="txn-name">${t.name}</div><div class="txn-sub">${t.cat} · ${t.src}</div></div><div><div class="txn-amt" style="color:#e17055">−₪${t.amt.toLocaleString()}</div><div class="txn-date">${t.date}</div></div></div>`).join('')}
  </div></div>`:''}
  <div style="padding:0 14px 14px"><button class="fab" onclick="openM('m-exp')">+ הוסף הוצאה</button></div>`;
}

// EXPENSES
let fCat='הכל';
function buildExp(){
  const el=document.getElementById('s-exp');
  const cats=['הכל',...new Set(txns.map(t=>t.cat))];
  const list=fCat==='הכל'?txns:txns.filter(t=>t.cat===fCat);
  const total=list.reduce((s,t)=>s+t.amt,0);
  el.innerHTML=`
  <div class="topbar"><div class="topbar-row"><div style="font-size:17px;font-weight:700">הוצאות</div><div style="font-size:14px;font-weight:700;color:rgba(255,255,255,.8)">${total>0?'₪'+total.toLocaleString():''}</div></div></div>
  <div style="padding:14px">
    <div class="search"><span style="font-size:16px;color:var(--text3)">🔍</span><input type="text" placeholder="חיפוש..." oninput="searchExp(this.value)"></div>
    <div class="chips">${cats.map(c=>`<button class="chip${c===fCat?' active':''}" onclick="fCat='${c}';buildExp()">${c}</button>`).join('')}</div>
    ${list.length?`<div class="card" id="exp-list">
      ${list.map(t=>`<div class="txn" data-name="${t.name.toLowerCase()}"><div class="txn-ic" style="background:${t.bg}">${t.ic}</div><div style="flex:1"><div class="txn-name">${t.name}</div><div class="txn-sub">${t.cat} · ${t.src}</div></div><div style="text-align:left"><div class="txn-amt" style="color:#e17055">−₪${t.amt.toLocaleString()}</div><div class="txn-date">${t.date}</div><div onclick="delTxn(${t.id})" style="font-size:10px;color:var(--text3);cursor:pointer;margin-top:2px">מחק</div></div></div>`).join('')}
    </div>`:`<div class="card"><div class="empty"><div class="empty-icon">🧾</div><div class="empty-title">אין עסקאות עדיין</div><div class="empty-sub">לחץ על + להוספת הוצאה</div></div></div>`}
    <div style="height:14px"></div>
    <button class="fab" onclick="openM('m-exp')">+ הוסף הוצאה</button>
  </div>`;

function searchExp(q){document.querySelectorAll('#exp-list .txn').forEach(t=>{t.style.display=(!q||t.dataset.name.includes(q.toLowerCase()))?'flex':'none'})}
function delTxn(id){if(!confirm('למחוק?'))return;txns=txns.filter(t=>t.id!==id);sv('txns',txns);buildExp();buildDash();toast('נמחק ✓')}

// BUDGET
let editBCat=null;
function buildBudget(){
  const el=document.getElementById('s-budget');
  const now=new Date();const m=now.getMonth();const y=now.getFullYear();
  const mt=txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y});
  const cats={};mt.forEach(t=>{cats[t.cat]=(cats[t.cat]||0)+t.amt});
  const totB=budgets.reduce((s,b)=>s+b.budget,0);
  const totS=Object.values(cats).reduce((s,v)=>s+v,0);
  const over=budgets.filter(b=>b.budget>0&&(cats[b.n]||0)>b.budget);
  el.innerHTML=`
  <div class="topbar">
    <div class="topbar-row"><div style="font-size:17px;font-weight:700">תקציב — ${MONTHS[m]}</div>${totB>0?`<div style="font-size:12px;color:rgba(255,255,255,.7)">₪${totS.toLocaleString()} / ₪${totB.toLocaleString()}</div>`:''}</div>
    ${totB>0?`<div style="height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;margin-top:10px"><div style="height:100%;border-radius:3px;background:linear-gradient(90deg,#36d399,#f59e0b);width:${Math.min(Math.round(totS/totB*100),100)}%;transition:width 1s ease"></div></div>`:''}
  </div>
  <div style="padding:14px">
    ${over.length?`<div class="alert-box"><div style="font-size:20px">⚠️</div><div style="font-size:12px;color:#fcd34d;line-height:1.5"><div style="font-weight:700;font-size:13px;margin-bottom:2px">${over.length} קטגוריות חרגו</div>${over.map(b=>`${b.n}: חריגה של ₪${((cats[b.n]||0)-b.budget).toLocaleString()}`).join(' · ')}</div></div>`:''}
    ${budgets.map(b=>{
      const spent=cats[b.n]||0;
      const cat=CATS.find(c=>c.n===b.n)||{ic:'📦',c:'#6d66e8',bg:'rgba(109,102,232,.15)'};
      const pct=b.budget>0?Math.min(Math.round(spent/b.budget*100),100):0;
      const ov=b.budget>0&&spent>b.budget;
      const bc=ov?'#e17055':pct>80?'#f59e0b':cat.c;
      return`<div class="budget-item" onclick="openBudgetM('${b.n}',${b.budget})">
        <div class="bi-top">
          <div class="bi-icon" style="background:${cat.bg}">${cat.ic}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:700">${b.n}</div><div style="font-size:11px;color:var(--text2);margin-top:1px">${b.budget>0?pct+'% מהתקציב':'לחץ להגדרת תקציב'}</div></div>
          <div style="text-align:left"><div style="font-size:15px;font-weight:800;color:${ov?'#e17055':cat.c}">₪${spent.toLocaleString()}</div><div style="font-size:10px;color:var(--text2)">${b.budget>0?'מתוך ₪'+b.budget.toLocaleString():'לא הוגדר'}</div></div>
        </div>
        ${b.budget>0?`<div class="bi-track"><div class="bi-fill" style="width:${pct}%;background:${bc}"></div></div><div style="display:flex;justify-content:space-between;font-size:11px"><div style="font-weight:600;color:${ov?'#e17055':'#36d399'}">${ov?'חריגה ₪'+(spent-b.budget).toLocaleString():'נשאר ₪'+(b.budget-spent).toLocaleString()}</div><div style="color:var(--text3)">יעד: ₪${b.budget.toLocaleString()}</div></div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}
function openBudgetM(n,cur){editBCat=n;document.getElementById('bm-title').textContent='תקציב — '+n;document.getElementById('bm-amt').value=cur||'';openM('m-budget')}
function saveBudget(){
  const v=parseFloat(document.getElementById('bm-amt').value)||0;
  const idx=budgets.findIndex(b=>b.n===editBCat);
  if(idx>=0)budgets[idx].budget=v;
  sv('budgets',budgets);closeM('m-budget');buildBudget();toast('תקציב עודכן ✓');
}

      </div>`).join('')}
      <div style="padding:12px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text2)">סה"כ חודשי</span><span style="font-weight:700">₪${insurances.reduce((s,i)=>s+(parseFloat(i.premium)||0),0).toLocaleString()}</span></div>
    </div>`:`<div class="card"><div class="empty"><div class="empty-icon">🛡️</div><div class="empty-title">אין ביטוחים עדיין</div><div class="empty-sub">הוסף ביטוח חיים, בריאות,<br>סיעוד או דירה</div></div></div>`}
    <button class="fab" style="margin-top:12px" onclick="openInsM(null)">+ הוסף ביטוח</button>`;
  }
}

function calcProj(){
  const age=parseInt(document.getElementById('p-age').value);
  const ret=parseFloat(document.getElementById('p-ret').value)/100;
  const cur=parseInt(document.getElementById('p-cur').value);
  document.getElementById('p-age-v').textContent=age;
  document.getElementById('p-ret-v').textContent=parseFloat(document.getElementById('p-ret').value).toFixed(1)+'%';
  document.getElementById('p-cur-v').textContent=cur;
  const years=age-cur;if(years<=0)return;
  const totB=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);
  const totM=funds.reduce((s,f)=>s+(parseFloat(f.monthly)||0),0);
  const r=ret/12;const months=years*12;
  const total=totB*Math.pow(1+ret,years)+totM*((Math.pow(1+r,months)-1)/r);
  const pension=Math.round(total/300);
  if(document.getElementById('p-total')){
    document.getElementById('p-total').textContent='₪'+(total/1000).toFixed(0)+'K';
    document.getElementById('p-sub').textContent='קצבה חודשית משוערת: ₪'+pension.toLocaleString();
    document.getElementById('p-years').textContent=years+' שנה';
    document.getElementById('p-monthly').textContent='₪'+pension.toLocaleString();
  }
}

function openFundM(id){
  editFundId=id;
  const f=id?funds.find(x=>x.id===id):null;
  document.getElementById('fm-title').textContent=f?'עריכת '+f.name:'קרן / חיסכון חדש';
  document.getElementById('fm-name').value=f?f.name:'';
  document.getElementById('fm-company').value=f?f.company:'';
  document.getElementById('fm-type').value=f?f.type:'קרן פנסיה';
  document.getElementById('fm-balance').value=f?f.balance:'';
  document.getElementById('fm-monthly').value=f?f.monthly:'';
  document.getElementById('fm-return').value=f?f.ret:'';
  document.getElementById('fm-delete').style.display=f?'block':'none';
  openM('m-fund');
}
function saveFund(){
  const name=document.getElementById('fm-name').value.trim();
  if(!name)return toast('הכנס שם',1);
  const fund={id:editFundId||Date.now(),name,company:document.getElementById('fm-company').value.trim(),type:document.getElementById('fm-type').value,balance:document.getElementById('fm-balance').value,monthly:document.getElementById('fm-monthly').value,ret:document.getElementById('fm-return').value};
  if(editFundId){const i=funds.findIndex(f=>f.id===editFundId);if(i>=0)funds[i]=fund}else funds.push(fund);
  sv('funds',funds);closeM('m-fund');buildPension();toast('נשמר ✓');
}
function deleteFund(){if(!confirm('למחוק?'))return;funds=funds.filter(f=>f.id!==editFundId);sv('funds',funds);closeM('m-fund');buildPension();toast('נמחק ✓')}

  document.getElementById('im-coverage').value=ins?ins.coverage:'';

  if(editInsId){const i=insurances.findIndex(x=>x.id===editInsId);if(i>=0)insurances[i]=ins}else insurances.push(ins);

function deleteIns(){if(!confirm('למחוק?'))return;insurances=insurances.filter(i=>i.id!==editInsId);sv('insurances',insurances);closeM('m-ins');buildPension();toast('נמחק ✓')}

// REPORTS
function buildReports(){
  const el=document.getElementById('s-reports');
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({m:d.getMonth(),y:d.getFullYear(),label:MONTHS[d.getMonth()]})}
  const md=months.map(({m,y,label})=>{
    const mt=txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y});
    const mi=incomes.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y});
    return{label,exp:mt.reduce((s,t)=>s+t.amt,0),inc:mi.reduce((s,t)=>s+t.amt,0)};
  });
  const maxV=Math.max(...md.flatMap(d=>[d.exp,d.inc]),1);
  const totE=txns.reduce((s,t)=>s+t.amt,0);
  const totI=incomes.reduce((s,t)=>s+t.amt,0);
  const cats={};txns.forEach(t=>{cats[t.cat]=(cats[t.cat]||0)+t.amt});
  const topC=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const maxC=topC[0]?.[1]||1;
  el.innerHTML=`
  <div class="topbar"><div style="font-size:17px;font-weight:700">דוחות</div></div>
  <div style="padding:14px">
    <div class="stat-grid">
      <div class="stat-card"><div style="font-size:20px;margin-bottom:6px">💸</div><div style="font-size:11px;color:var(--text2)">סה"כ הוצאות</div><div style="font-size:18px;font-weight:800;margin-top:2px;color:#e17055">${totE>0?'₪'+totE.toLocaleString():'—'}</div></div>
      <div class="stat-card"><div style="font-size:20px;margin-bottom:6px">💰</div><div style="font-size:11px;color:var(--text2)">סה"כ הכנסות</div><div style="font-size:18px;font-weight:800;margin-top:2px;color:#00b894">${totI>0?'₪'+totI.toLocaleString():'—'}</div></div>
      <div class="stat-card"><div style="font-size:20px;margin-bottom:6px">🏦</div><div style="font-size:11px;color:var(--text2)">חיסכון כולל</div><div style="font-size:18px;font-weight:800;margin-top:2px;color:#0984e3">${totI>0||totE>0?'₪'+(totI-totE).toLocaleString():'—'}</div></div>
      <div class="stat-card"><div style="font-size:20px;margin-bottom:6px">🧾</div><div style="font-size:11px;color:var(--text2)">סה"כ עסקאות</div><div style="font-size:18px;font-weight:800;margin-top:2px;color:#a855f7">${txns.length}</div></div>
    </div>
    ${md.some(d=>d.exp>0||d.inc>0)?`<div class="card pad" style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">6 חודשים אחרונים</div>
      <div style="display:flex;gap:10px;margin-bottom:8px">${[['rgba(109,102,232,.6)','הכנסה'],['rgba(225,112,85,.6)','הוצאות']].map(([c,l])=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:${c}"></div><span style="font-size:10px;color:var(--text2)">${l}</span></div>`).join('')}</div>
      <div style="display:flex;align-items:flex-end;gap:5px;height:100px">
        ${md.map(d=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"><div style="display:flex;gap:2px;align-items:flex-end;width:100%"><div style="flex:1;border-radius:3px 3px 0 0;background:rgba(109,102,232,.6);height:${Math.round(d.inc/maxV*90)}px;min-height:${d.inc>0?3:0}px"></div><div style="flex:1;border-radius:3px 3px 0 0;background:rgba(225,112,85,.6);height:${Math.round(d.exp/maxV*90)}px;min-height:${d.exp>0?3:0}px"></div></div><div style="font-size:9px;color:var(--text2)">${d.label.slice(0,3)}</div></div>`).join('')}
      </div>
    </div>`:''}
    ${topC.length?`<div class="card pad">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px">הוצאות לפי קטגוריה</div>
      ${topC.map(([cat,amt])=>{const c=CATS.find(x=>x.n===cat)||{c:'#6d66e8'};return`<div class="bar-row"><div class="bar-lbl">${cat}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxC*100)}%;background:${c.c}"></div></div><div class="bar-amt">₪${amt.toLocaleString()}</div></div>`;}).join('')}
    </div>`:`<div class="card"><div class="empty"><div class="empty-icon">📊</div><div class="empty-title">אין נתונים עדיין</div><div class="empty-sub">הוסף הוצאות כדי לראות דוחות</div></div></div>`}
  </div>`;
}

buildDash();
