<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BOX3.0 — ניהול משק בית</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#242438;
  --card:#1e1e32;--card2:#252540;
  --primary:#4338ca;--primary2:#3730a3;--primary-light:#6d66e8;
  --green:#00b894;--green-bg:rgba(0,184,148,.12);
  --red:#e17055;--red-bg:rgba(225,112,85,.12);
  --blue:#0984e3;--blue-bg:rgba(9,132,227,.12);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.12);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.12);
  --text:#f0f0ff;--text2:#a0a0c0;--text3:#606080;
  --border:rgba(255,255,255,.07);--radius:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative}
.screen{flex:1;overflow-y:auto;padding-bottom:80px}
.screen::-webkit-scrollbar{display:none}

/* TOPBAR */
.topbar{background:linear-gradient(160deg,#1a1040,#2d1f6e 60%,#4338ca);padding:14px 18px 20px;color:#fff}
.topbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.topbar h1{font-size:17px;font-weight:700}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}

/* NAVBAR */
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:8px 0 max(12px,env(safe-area-inset-bottom));z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.4;transition:opacity .2s}
.nav-item.active{opacity:1}
.nav-item .ni{font-size:22px}
.nav-item .nl{font-size:10px;font-weight:600;color:var(--primary-light)}
.nav-item:not(.active) .nl{color:var(--text3)}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.pad{padding:16px}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.kpi{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px}
.kpi-icon{font-size:22px;margin-bottom:6px}
.kpi-lbl{font-size:11px;color:var(--text2);font-weight:500}
.kpi-val{font-size:22px;font-weight:800;letter-spacing:-.5px;margin:3px 0}
.kpi-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}

/* SECTION */
.sec{padding:0 14px;margin-bottom:14px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-hdr h2{font-size:14px;font-weight:700}
.sec-hdr a{font-size:12px;color:var(--primary-light);cursor:pointer}

/* TXN */
.txn{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border)}
.txn:last-child{border-bottom:none}
.txn-ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.txn-info{flex:1;min-width:0}
.txn-name{font-size:13px;font-weight:600}
.txn-cat{font-size:11px;color:var(--text2);margin-top:1px}
.txn-amt{font-size:14px;font-weight:800}
.txn-date{font-size:10px;color:var(--text3);text-align:left}

/* DONUT */
.donut-wrap{position:relative;display:flex;justify-content:center;margin:8px 0}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-center .dv{font-size:20px;font-weight:800}
.donut-center .dl{font-size:10px;color:var(--text2)}

/* BARS */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:11px;color:var(--text2);width:72px;text-align:right;font-weight:500}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.bar-amt{font-size:11px;color:var(--text2);width:58px;text-align:left}

/* QUICK ACTIONS */
.qa-grid{display:flex;gap:10px;overflow-x:auto;padding:0 14px 14px}
.qa-grid::-webkit-scrollbar{display:none}
.qa{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.qa-ic{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px}
.qa-lbl{font-size:10px;color:var(--text2);font-weight:500;white-space:nowrap}

/* TABS */
.tabs{display:flex;background:var(--card);border-radius:12px;padding:4px;gap:4px;margin-bottom:12px}
.tab{flex:1;padding:8px;border-radius:9px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:inherit;color:var(--text2);background:transparent;transition:all .2s}
.tab.active{background:var(--primary);color:#fff}

/* CHIPS */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.chip.active{background:var(--primary);color:#fff}
.chip:not(.active){background:var(--card2);color:var(--text2)}

/* SEARCH */
.search{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:12px;padding:10px 14px;margin-bottom:12px;border:1px solid var(--border)}
.search input{border:none;outline:none;font-family:inherit;font-size:13px;flex:1;color:var(--text);background:transparent;direction:rtl}
.search input::placeholder{color:var(--text3)}

/* BUDGET */
.budget-item{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer}
.bi-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bi-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bi-info{flex:1}
.bi-name{font-size:13px;font-weight:700}
.bi-meta{font-size:11px;color:var(--text2);margin-top:1px}
.bi-right{text-align:left}
.bi-spent{font-size:15px;font-weight:800}
.bi-budget{font-size:10px;color:var(--text2)}
.bi-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:6px}
.bi-fill{height:100%;border-radius:3px;transition:width 1s ease}
.bi-footer{display:flex;justify-content:space-between;font-size:11px}
.bi-remain{font-weight:600}

/* ALERT */
.alert{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:12px 14px;display:flex;gap:10px;margin-bottom:12px}
.alert-text{font-size:12px;color:#fcd34d;line-height:1.5}
.alert-title{font-weight:700;font-size:13px;margin-bottom:2px}

/* FUND CARD */
.fund-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer}
.fc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fc-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fc-name{font-size:13px;font-weight:700}
.fc-company{font-size:11px;color:var(--text2);margin-top:1px}
.fc-val{font-size:16px;font-weight:800}
.fc-return{font-size:11px;font-weight:600;margin-top:1px}
.fc-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding-top:10px;border-top:1px solid var(--border)}
.fcd{text-align:center}
.fcd-val{font-size:12px;font-weight:700}
.fcd-lbl{font-size:10px;color:var(--text2);margin-top:1px}

/* PENSION HEADER */
.pension-hdr{background:linear-gradient(160deg,#0f1a2e,#1a3050 60%,#1e4976);padding:16px 18px 20px;color:#fff}
.retire-box{background:rgba(0,0,0,.3);border-radius:14px;padding:14px}
.retire-row{display:flex;justify-content:space-between;margin-bottom:10px}
.retire-lbl{font-size:11px;opacity:.6;margin-bottom:3px}
.retire-val{font-size:24px;font-weight:800;letter-spacing:-.5px}
.retire-sub{font-size:11px;opacity:.5;margin-top:1px}
.retire-track{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin:8px 0}
.retire-fill{height:100%;background:linear-gradient(90deg,#36d399,#3abff8);border-radius:4px;transition:width 1.2s ease}
.retire-stats{display:flex;justify-content:space-between;margin-top:6px}
.rs-val{font-size:14px;font-weight:700;text-align:center}
.rs-lbl{font-size:10px;opacity:.5;text-align:center;margin-top:1px}

/* SLIDER */
.slider-wrap{margin-bottom:14px}
.slider-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.slider-lbl span:last-child{font-weight:700;color:var(--primary-light)}
input[type=range]{width:100%;accent-color:var(--primary-light)}
.proj-result{background:linear-gradient(135deg,#0f1a2e,#1e4976);border-radius:12px;padding:14px;text-align:center;margin-top:8px;border:1px solid rgba(59,191,248,.2)}
.proj-val{font-size:26px;font-weight:800;letter-spacing:-.5px;color:#3abff8}
.proj-lbl{font-size:11px;color:var(--text2);margin-bottom:6px}
.proj-sub{font-size:11px;color:var(--text2);margin-top:6px}
.proj-row{display:flex;justify-content:space-around;margin-top:10px}
.pi-val{font-size:13px;font-weight:700;text-align:center}
.pi-lbl{font-size:10px;color:var(--text2);text-align:center;margin-top:1px}

/* INS */
.ins-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.ins-row:last-child{border-bottom:none}
.ins-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ins-name{font-size:13px;font-weight:600}
.ins-sub{font-size:11px;color:var(--text2);margin-top:1px}
.ins-premium{font-size:13px;font-weight:700;text-align:left}
.ins-coverage{font-size:10px;color:var(--text2);text-align:left;margin-top:1px}

/* REPORTS */
.reports-hdr{background:linear-gradient(160deg,#1a1040,#2d1f6e 60%,#4338ca);padding:14px 18px 20px}
.period-tabs{display:flex;background:rgba(0,0,0,.3);border-radius:10px;padding:3px;gap:3px}
.ptab{flex:1;padding:7px;border-radius:8px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:inherit;color:rgba(255,255,255,.4);background:transparent;transition:all .2s}
.ptab.active{background:#fff;color:var(--primary)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:12px}
.stat-icon{font-size:20px;margin-bottom:6px}
.stat-lbl{font-size:11px;color:var(--text2);font-weight:500}
.stat-val{font-size:17px;font-weight:800;margin-top:2px}
.stat-trend{font-size:11px;font-weight:600;margin-top:3px}

/* BAR CHART */
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:110px;padding-bottom:4px}
.bc-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bc-bars{display:flex;gap:2px;align-items:flex-end;width:100%}
.bc-bar{border-radius:3px 3px 0 0;flex:1;min-height:3px;transition:height .8s ease}
.bc-lbl{font-size:9px;color:var(--text2);text-align:center}

/* INSIGHT */
.insight{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;cursor:pointer}
.ins-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;margin-top:4px}
.ins-title{font-size:13px;font-weight:700;margin-bottom:2px}
.ins-desc{font-size:12px;color:var(--text2);line-height:1.4}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:12px;padding:8px 14px;margin-bottom:12px;border:1px solid var(--border)}
.month-arr{font-size:20px;cursor:pointer;color:var(--text2);padding:0 4px}
.month-name{font-size:14px;font-weight:700}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;padding:20px 18px;width:100%;max-width:430px}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;letter-spacing:.3px}
.modal-slider-val{font-size:24px;font-weight:800;color:var(--primary-light);text-align:center;margin:4px 0}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-cancel{flex:1;background:var(--card2);color:var(--text2);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-save{flex:2;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* CC COMPARE */
.cc-legend{display:flex;gap:12px;margin-bottom:10px}
.cc-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.cc-dot{width:8px;height:8px;border-radius:50%}
.cc-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cc-lbl{font-size:11px;color:var(--text2);width:70px;text-align:right;font-weight:500}
.cc-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.cc-bar-wrap{display:flex;align-items:center;gap:4px}
.cc-bar{height:6px;border-radius:3px;transition:width 1s ease;min-width:2px}
.cc-num{font-size:10px;color:var(--text2);white-space:nowrap}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

</div>

function calcProj(){
  const age=parseInt(document.getElementById('p-age').value);
  const ret=parseFloat(document.getElementById('p-ret').value)/100;
  const add=parseInt(document.getElementById('p-add').value);
  const years=age-40;
  const monthly=1850+add;
  const r=ret/12;
  const m=years*12;
  let total=312400*Math.pow(1+ret,years)+monthly*((Math.pow(1+r,m)-1)/r);
  total=Math.round(total/1000)*1000;
  const pension=Math.round(total/300);
  const gap=2100000-total;
  document.getElementById('p-age-v').textContent=age;
  document.getElementById('p-ret-v').textContent=parseFloat(document.getElementById('p-ret').value).toFixed(1)+'%';
  document.getElementById('p-add-v').textContent='₪'+add.toLocaleString();
  document.getElementById('p-total').textContent='₪'+(total/1000).toFixed(0)+'K';
  document.getElementById('p-sub').textContent='קצבה חודשית משוערת: ₪'+pension.toLocaleString();
  document.getElementById('p-years').textContent=years;
  document.getElementById('p-monthly').textContent='₪'+pension.toLocaleString();
  const gEl=document.getElementById('p-gap');
  gEl.textContent=gap>0?'₪'+(gap/1000).toFixed(0)+'K חסר':'יעד הושג! ✓';
  gEl.style.color=gap>0?'#f59e0b':'#36d399';
}
