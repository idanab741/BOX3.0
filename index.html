<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BOX3.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f7;--card:#ffffff;--card2:#f8f9fc;
  --primary:#4338ca;--pl:#6d66e8;--primary-dark:#3730a3;
  --green:#00916e;--green-bg:#e8faf6;
  --red:#c0392b;--red-bg:#fef0ec;
  --blue:#0969da;--blue-bg:#e8f4fd;
  --amber:#b45309;--amber-bg:#fef9e7;
  --purple:#7c3aed;--purple-bg:#f0eeff;
  --text:#1a1a2e;--text2:#555570;--text3:#9090aa;
  --border:#e4e6f0;--border2:#d0d3e8;
  --shadow:0 2px 8px rgba(0,0,0,.08);
  --radius:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;padding-bottom:88px}
.screen::-webkit-scrollbar{display:none}

/* AUTH SCREEN */
.auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;min-height:100vh}
.auth-logo{font-size:48px;margin-bottom:8px}
.auth-title{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:4px;letter-spacing:-1px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.auth-card{background:var(--card);border-radius:20px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.1);padding:24px;width:100%;max-width:360px}
.auth-tab-row{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:20px}
.auth-tab{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:inherit;color:var(--text2);background:transparent;transition:all .2s}
.auth-tab.active{background:var(--primary);color:#fff}
.auth-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;display:block}
.auth-input{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;direction:rtl;margin-bottom:12px;-webkit-appearance:none}
.auth-input:focus{border-color:var(--primary)}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.auth-error{background:var(--red-bg);border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.auth-user-bar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:12px;padding:8px 12px;margin-top:8px;cursor:pointer}

/* TOPBAR */
.topbar{background:linear-gradient(160deg,#1e1b4b,#312e81 55%,#4338ca);padding:16px 18px 22px;color:#fff}
.topbar-row{display:flex;justify-content:space-between;align-items:center}

/* NAVBAR */
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:10px 0 max(14px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.35;transition:opacity .2s}
.nav-item.active{opacity:1}
.nav-item .ni{font-size:22px}
.nav-item .nl{font-size:10px;font-weight:700;color:var(--primary)}
.nav-item:not(.active) .nl{color:var(--text3)}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.pad{padding:16px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.kpi{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s}
.kpi:active{transform:scale(.97)}
.kpi-icon{font-size:22px;margin-bottom:6px}
.kpi-lbl{font-size:11px;color:var(--text2);font-weight:600}
.kpi-val{font-size:22px;font-weight:800;letter-spacing:-.5px;margin:3px 0}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* SEC */
.sec{padding:0 14px;margin-bottom:14px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-hdr h2{font-size:14px;font-weight:700;color:var(--text)}
.sec-hdr a{font-size:12px;color:var(--primary);cursor:pointer;font-weight:600}

/* TXN */
.txn{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border)}
.txn:last-child{border-bottom:none}
.txn-ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.txn-name{font-size:13px;font-weight:600;color:var(--text)}
.txn-sub{font-size:11px;color:var(--text2);margin-top:1px}
.txn-amt{font-size:14px;font-weight:800;text-align:left}
.txn-date{font-size:10px;color:var(--text3);text-align:left}

/* BARS */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bar-lbl{font-size:11px;color:var(--text2);width:72px;text-align:right;font-weight:600}
.bar-track{flex:1;height:7px;background:#e8eaf4;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
.bar-amt{font-size:11px;color:var(--text2);width:62px;text-align:left;font-weight:600}

/* GOAL CARD */
.goal-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.goal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.goal-name{font-size:13px;font-weight:700;color:var(--text)}
.goal-amt{font-size:13px;font-weight:800}
.goal-sub{font-size:11px;color:var(--text2);margin-bottom:8px}
.goal-track{height:8px;background:#e8eaf4;border-radius:4px;overflow:hidden}
.goal-fill{height:100%;border-radius:4px;transition:width .8s ease}
.goal-footer{display:flex;justify-content:space-between;margin-top:6px;font-size:11px}

/* BUDGET */
.budget-item{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.bi-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bi-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bi-track{height:7px;background:#e8eaf4;border-radius:4px;overflow:hidden;margin-bottom:6px}
.bi-fill{height:100%;border-radius:4px;transition:width .8s ease}

/* DEBT */
.debt-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.debt-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.debt-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.debt-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.debt-track{flex:1;height:7px;background:#e8eaf4;border-radius:4px;overflow:hidden}
.debt-fill{height:100%;border-radius:4px;background:var(--red)}

/* FORECAST */
.forecast-card{background:linear-gradient(135deg,#1e1b4b,#4338ca);border-radius:14px;padding:14px 16px;margin-bottom:10px;color:#fff}
.fc-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.12);font-size:13px}
.fc-row:last-child{border-bottom:none}

/* TABS */
.tabs{display:flex;background:var(--card);border-radius:12px;padding:4px;gap:4px;margin-bottom:12px;border:1px solid var(--border)}
.tab{flex:1;padding:8px;border-radius:9px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:inherit;color:var(--text2);background:transparent;transition:all .2s}
.tab.active{background:var(--primary);color:#fff}

/* CHIPS */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.chip.active{background:var(--primary);color:#fff}
.chip:not(.active){background:var(--card);color:var(--text2);border:1px solid var(--border)}

/* SEARCH */
.search{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:12px;padding:10px 14px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.search input{border:none;outline:none;font-family:inherit;font-size:13px;flex:1;color:var(--text);background:transparent;direction:rtl}
.search input::placeholder{color:var(--text3)}

/* FUND */
.fund-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.fc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fc-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fc-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding-top:10px;border-top:1px solid var(--border)}
.fcd-val{font-size:12px;font-weight:700;color:var(--text);text-align:center}
.fcd-lbl{font-size:10px;color:var(--text3);margin-top:1px;text-align:center}

/* INS */
.ins-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.ins-row:last-child{border-bottom:none}
.ins-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}

/* STAT */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:12px;box-shadow:var(--shadow)}

/* ALERT */
.alert{border-radius:12px;padding:12px 14px;display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.alert.warn{background:var(--amber-bg);border:1px solid #fde68a}
.alert.danger{background:var(--red-bg);border:1px solid #fca5a5}
.alert.good{background:var(--green-bg);border:1px solid #6ee7b7}

/* EMPTY */
.empty{text-align:center;padding:36px 20px}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:12px;color:var(--text3);line-height:1.6}

/* FAB */
.fab{width:calc(100% - 28px);margin:0 14px;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(67,56,202,.35)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:20px 18px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal::-webkit-scrollbar{display:none}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;color:var(--text)}
.modal-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;letter-spacing:.3px;display:block}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;direction:rtl;-webkit-appearance:none;margin-bottom:4px}
.modal-input:focus{border-color:var(--primary)}
.modal-select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none;direction:rtl;-webkit-appearance:none}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-cancel{flex:1;background:var(--bg);color:var(--text2);border:1px solid var(--border);border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-save{flex:2;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.modal-delete{width:100%;background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}

/* NUMPAD */
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);background:var(--bg);border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.nk{padding:17px 0;text-align:center;font-size:20px;font-weight:600;cursor:pointer;border-left:1px solid var(--border);border-bottom:1px solid var(--border);user-select:none;transition:background .1s;color:var(--text)}
.nk:active{background:var(--border)}
.nk:nth-child(3n+1){border-left:none}
.nk.spec{color:var(--primary);font-size:14px}
.amount-big{text-align:center;padding:14px;font-size:42px;font-weight:800;letter-spacing:-2px;min-height:66px;color:var(--text)}
.amount-big .cur{font-size:22px;color:var(--text3);font-weight:500}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 4px;border-radius:12px;border:2px solid transparent;transition:all .15s;background:transparent}
.cat-btn.sel{border-color:var(--primary);background:rgba(67,56,202,.08)}
.cat-btn-ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px}
.cat-btn-lbl{font-size:10px;font-weight:600;color:var(--text2);text-align:center}

/* PROJ */
.slider-wrap{margin-bottom:14px}
.slider-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.slider-lbl span:last-child{font-weight:700;color:var(--primary)}
input[type=range]{width:100%;accent-color:var(--primary)}
.proj-result{background:linear-gradient(135deg,#1e1b4b,#4338ca);border-radius:12px;padding:16px;text-align:center;margin-top:8px;color:#fff}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.toast.err{background:var(--red)}

/* LOADER */
.loader-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loader-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- AUTH -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-logo">📦</div>
    <div class="auth-title">BOX3.0</div>
    <div class="auth-sub">ניהול כספים משפחתי</div>
    <div class="auth-card">
      <div class="auth-tab-row">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">כניסה</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">הרשמה</button>
      </div>
      <div id="auth-error" class="auth-error"></div>
      <label class="auth-label">אימייל</label>
      <input class="auth-input" id="auth-email" type="email" placeholder="mail@example.com" autocomplete="email">
      <label class="auth-label">סיסמה</label>
      <input class="auth-input" id="auth-pass" type="password" placeholder="לפחות 6 תווים" autocomplete="current-password">
      <div id="auth-name-wrap" style="display:none">
        <label class="auth-label">שם המשפחה / הזוג</label>
        <input class="auth-input" id="auth-name" type="text" placeholder="משפחת כהן, נועה ויובל...">
      </div>
      <button class="auth-btn" id="auth-submit-btn" onclick="doAuth()">כניסה</button>
      <div style="margin-top:14px;font-size:11px;color:var(--text3);text-align:center;line-height:1.6">
        💡 בני זוג ומשפחה — הירשמו עם <strong>אותו אימייל וסיסמה</strong><br>כדי לשתף את אותם הנתונים
      </div>
    </div>
  </div>

  <!-- MAIN APP (hidden until logged in) -->
  <div id="main-app" style="display:none;flex:1;flex-direction:column">
    <div class="screen" id="s-dash" style="display:block"></div>
    <div class="screen" id="s-exp" style="display:none"></div>
    <div class="screen" id="s-inc" style="display:none"></div>
    <div class="screen" id="s-budget" style="display:none"></div>
    <div class="screen" id="s-track" style="display:none"></div>
    <div class="screen" id="s-pension" style="display:none"></div>

    <nav class="navbar">
      <div class="nav-item active" onclick="nav('dash',this)"><div class="ni">🏠</div><div class="nl">ראשי</div></div>
      <div class="nav-item" onclick="nav('exp',this)"><div class="ni">💸</div><div class="nl">הוצאות</div></div>
      <div class="nav-item" onclick="nav('inc',this)"><div class="ni">💰</div><div class="nl">הכנסות</div></div>
      <div class="nav-item" onclick="nav('budget',this)"><div class="ni">🎯</div><div class="nl">תקציב</div></div>
      <div class="nav-item" onclick="nav('track',this)"><div class="ni">📈</div><div class="nl">מעקב</div></div>
      <div class="nav-item" onclick="nav('pension',this)"><div class="ni">🏛️</div><div class="nl">פנסיה</div></div>
    </nav>
  </div>

  <!-- EXPENSE MODAL -->
  <div class="modal-overlay" id="m-exp">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">הוצאה חדשה</div>
      <div class="amount-big"><span class="cur">₪</span><span id="exp-num">0</span></div>
      <div class="numpad-grid" id="numpad"></div>
      <label class="modal-label">שם / תיאור</label>
      <input class="modal-input" id="exp-name" type="text" placeholder="למשל: שופרסל, תדלוק...">
      <label class="modal-label" style="margin-top:10px">קטגוריה</label>
      <div class="cat-grid" id="cat-grid"></div>
      <label class="modal-label">אמצעי תשלום</label>
      <select class="modal-select" id="exp-src">
        <option>מזומן</option><option>לאומי</option><option>מקס</option><option>ישראכרט</option><option>אחר</option>
      </select>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeM('m-exp')">ביטול</button>
        <button class="modal-save" onclick="saveExp()">שמור הוצאה</button>
      </div>
    </div>
  </div>

  <!-- INCOME MODAL -->
  <div class="modal-overlay" id="m-inc">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title" id="inc-title">הכנסה חדשה</div>
      <label class="modal-label">סכום (₪)</label>
      <input class="modal-input" id="inc-amt" type="number" placeholder="0" inputmode="numeric">
      <label class="modal-label" style="margin-top:10px">מקור</label>
      <input class="modal-input" id="inc-src" type="text" placeholder="משכורת, פרילנס, אחר...">
      <label class="modal-label" style="margin-top:10px">תאריך</label>
      <input class="modal-input" id="inc-date" type="text" placeholder="השאר ריק לתאריך היום">
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeM('m-inc')">ביטול</button>
        <button class="modal-save" onclick="saveInc()">שמור הכנסה</button>
      </div>
      <button class="modal-delete" id="inc-del" onclick="deleteInc()" style="display:none">מחק הכנסה</button>
    </div>
  </div>

  <!-- BUDGET MODAL -->
  <div class="modal-overlay" id="m-budget">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title" id="bm-title">תקציב קטגוריה</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ============================================================
// 🔧 הכנס כאן את ה-firebaseConfig שלך מ-Firebase Console
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyD4qIs4VzS5CZSAaFeZL-q0cXyt9TxfMdo",
  authDomain: "box3-0.firebaseapp.com",
  projectId: "box3-0",
  storageBucket: "box3-0.firebasestorage.app",
  messagingSenderId: "702274544895",
  appId: "1:702274544895:web:e42f6237c30b95462e98ca",
  measurementId: "G-E73QBL8JRE"
};
// ============================================================

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUID = null;
let unsubscribe = null;

// ── AUTH STATE ──────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    currentUID = user.uid;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    listenToData(user.uid);
  } else {
    currentUID = null;
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
  }
});

// ── AUTH FUNCTIONS ─────────────────────────────────────────
window.switchAuthTab = function(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('auth-name-wrap').style.display = tab==='register'?'block':'none';
  document.getElementById('auth-submit-btn').textContent = tab==='register'?'הרשמה':'כניסה';
  document.getElementById('auth-error').style.display = 'none';
  window._authTab = tab;
};
window._authTab = 'login';

window.doAuth = async function() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!email || !pass) { showErr('נא למלא אימייל וסיסמה'); return; }
  try {
    showLoader(true);
    if (window._authTab === 'register') {
      const name = document.getElementById('auth-name').value.trim() || 'המשפחה שלנו';
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      // init empty doc for new user
      await setDoc(doc(db,'users',cred.user.uid), {
        familyName: name,
        txns:[], incomes:[], budgets: CATS.map(c=>({n:c.n,budget:0})),
        goals:[], debts:[], funds:[], insurances:[]
      });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    showLoader(false);
    const msgs = {
      'auth/email-already-in-use': 'האימייל כבר קיים. נסה להתחבר במקום.',
      'auth/invalid-email': 'כתובת אימייל לא תקינה',
      'auth/weak-password': 'הסיסמה חלשה מדי (לפחות 6 תווים)',
      'auth/invalid-credential': 'אימייל או סיסמה שגויים',
      'auth/user-not-found': 'משתמש לא קיים',
      'auth/wrong-password': 'סיסמה שגויה',
    };
    showErr(msgs[e.code] || 'שגיאה: '+e.message);
  }
};

function showErr(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── REAL-TIME DATA LISTENER ────────────────────────────────
function listenToData(uid) {
  showLoader(true);
  unsubscribe = onSnapshot(doc(db,'users',uid), snap => {
    if (!snap.exists()) return;
    const d = snap.data();
    txns        = d.txns        || [];
    incomes     = d.incomes     || [];
    budgets     = d.budgets     || CATS.map(c=>({n:c.n,budget:0}));
    goals       = d.goals       || [];
    debts       = d.debts       || [];
    funds       = d.funds       || [];
    insurances  = d.insurances  || [];
    showLoader(false);
    // re-render current screen
    const active = document.querySelector('.screen[style*="block"]');
    if(active) {
      const id = active.id.replace('s-','');
      ({dash:buildDash,exp:buildExp,inc:buildIncomesScreen,budget:buildBudget,track:buildTrack,pension:buildPension})[id]?.();
    }
  }, err => {
    showLoader(false);
    console.error(err);
  });
}

// ── SAVE TO FIRESTORE ──────────────────────────────────────
async function saveToCloud(data) {
  if (!currentUID) return;
  try {
    await updateDoc(doc(db,'users',currentUID), data);
  } catch(e) {
    // if doc doesn't exist yet, create it
    await setDoc(doc(db,'users',currentUID), {
      txns, incomes, budgets, goals, debts, funds, insurances, ...data
    });
  }
}

// Replace sv() to save to Firestore
window.sv = async function(key, val) {
  await saveToCloud({ [key]: val });
};

window.signOutUser = async function() {
  if (!confirm('להתנתק?')) return;
  await signOut(auth);
};

function showLoader(show) {
  document.getElementById('loader').style.display = show ? 'flex' : 'none';
}

// kick off
buildDash();

</script>

<script>

const MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const FUND_IC={'קרן פנסיה':'🏛️','קרן השתלמות':'📈','קופת גמל':'🏦','ביטוח מנהלים':'💼','חיסכון אחר':'💰'};
const FUND_C={'קרן פנסיה':'#0969da','קרן השתלמות':'#00916e','קופת גמל':'#7c3aed','ביטוח מנהלים':'#b45309','חיסכון אחר':'#4338ca'};
const FUND_BG={'קרן פנסיה':'#e8f4fd','קרן השתלמות':'#e8faf6','קופת גמל':'#f0eeff','ביטוח מנהלים':'#fef9e7','חיסכון אחר':'#eef2ff'};
const INS_IC={'ביטוח חיים':'❤️','ביטוח בריאות':'🏥','ביטוח סיעוד':'🦽','ביטוח דירה':'🏠','ביטוח רכב':'🚗','אחר':'📋'};
const INS_BG={'ביטוח חיים':'#fef0ec','ביטוח בריאות':'#e8faf6','ביטוח סיעוד':'#f0eeff','ביטוח דירה':'#fef9e7','ביטוח רכב':'#e8f4fd','אחר':'#f4f4f8'};

// Data arrays (populated by Firestore listener)
let txns=[], incomes=[], budgets=CATS.map(c=>({n:c.n,budget:0}));
let goals=[], debts=[], funds=[], insurances=[];

function nav(name,el){
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');

  ({dash:buildDash,exp:buildExp,inc:buildIncomesScreen,budget:buildBudget,track:buildTrack,pension:buildPension})[name]?.();

function closeM(id){document.getElementById(id).classList.remove('show')}
function openM(id){document.getElementById(id).classList.add('show')}

// NUMPAD
let expAmt='';
const npEl=document.getElementById('numpad');
['7','8','9','4','5','6','1','2','3','.','0','⌫'].forEach(k=>{
  const d=document.createElement('div');
  d.className='nk'+(k==='⌫'||k==='.'?' spec':'');

    if(k==='⌫')expAmt=expAmt.slice(0,-1);
    else if(k==='.'){if(!expAmt.includes('.'))expAmt+=k}

    document.getElementById('exp-num').textContent=expAmt||'0';
  };
  npEl.appendChild(d);
});

let selCat=CATS[0].n;
const cgEl=document.getElementById('cat-grid');
CATS.forEach(c=>{
  const d=document.createElement('div');

});

async function saveExp(){
  const amt=parseFloat(expAmt);
  const name=document.getElementById('exp-name').value.trim();

  const avgDaily=now.getDate()>0?Math.round(totE/now.getDate()):0;

  const maxC=topC[0]?.[1]||1;

  el.innerHTML=`

        <span onclick="signOutUser()" style="font-size:11px;cursor:pointer;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:8px;white-space:nowrap">יציאה</span>

      <div class="kpi-val" style="color:var(--green)">${totI>0?'₪'+totI.toLocaleString():'—'}</div>
      <div class="kpi-sub">${mi.length>0?mi.length+' הכנסות':'לחץ לניהול הכנסות'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">💸</div><div class="kpi-lbl">הוצאות החודש</div>
      <div class="kpi-val" style="color:var(--red)">${totE>0?'₪'+totE.toLocaleString():'—'}</div>

    </div>
    <div class="kpi">
      <div class="kpi-icon">🏦</div><div class="kpi-lbl">חיסכון החודש</div>
      <div class="kpi-val" style="color:${saving>=0?'var(--blue)':'var(--red)'}">${totI>0||totE>0?'₪'+saving.toLocaleString():'—'}</div>
      <div class="kpi-sub">${totI>0?Math.round(saving/totI*100)+'% מההכנסה':'הוסף הכנסה'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">🔮</div><div class="kpi-lbl">תחזית לסוף חודש</div>
      <div class="kpi-val" style="color:var(--purple)">${totE>0?'₪'+forecastEnd.toLocaleString():'—'}</div>
      <div class="kpi-sub">${totBudget>0&&totE>0?'תקציב נשאר: ₪'+budgetLeft.toLocaleString():''}</div>
    </div>
  </div>

  ${overBudget.length?`<div class="sec"><div class="alert warn"><div style="font-size:20px">⚠️</div><div style="font-size:12px;color:#92400e;line-height:1.5"><div style="font-weight:700;margin-bottom:2px">חריגה ב-${overBudget.length} קטגוריות</div>${overBudget.map(b=>`${b.n}: ₪${((cats[b.n]||0)-b.budget).toLocaleString()}`).join(' · ')}</div></div></div>`:''}

  ${topC.length?`<div class="sec"><div class="sec-hdr"><h2>הוצאות לפי קטגוריה</h2><a onclick="document.querySelectorAll('.nav-item')[1].click()">הכל ›</a></div><div class="card pad">
    ${topC.map(([cat,amt])=>{const c=CATS.find(x=>x.n===cat)||{c:'#4338ca'};return`<div class="bar-row"><div class="bar-lbl">${cat}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxC*100)}%;background:${c.c}"></div></div><div class="bar-amt">₪${amt.toLocaleString()}</div></div>`;}).join('')}
  </div></div>`:''}

  ${totE>0?`<div class="sec"><div class="sec-hdr"><h2>תחזית סוף חודש</h2></div>
  <div class="forecast-card">
    <div class="fc-row"><span style="opacity:.7">ממוצע יומי</span><span style="font-weight:700">₪${avgDaily.toLocaleString()}</span></div>
    <div class="fc-row"><span style="opacity:.7">ימים שנשארו</span><span style="font-weight:700">${daysLeft} ימים</span></div>
    <div class="fc-row"><span style="opacity:.7">הוצאות צפויות נוספות</span><span style="font-weight:700">₪${(avgDaily*daysLeft).toLocaleString()}</span></div>
    <div class="fc-row"><span style="font-weight:700">סה"כ צפוי</span><span style="font-size:18px;font-weight:800;color:#a5f3fc">₪${forecastEnd.toLocaleString()}</span></div>

  </div></div>`:''}

  ${txns.length?`<div class="sec"><div class="sec-hdr"><h2>עסקאות אחרונות</h2><a onclick="document.querySelectorAll('.nav-item')[1].click()">הכל ›</a></div><div class="card">
    ${txns.slice(0,4).map(t=>`<div class="txn"><div class="txn-ic" style="background:${t.bg}">${t.ic}</div><div style="flex:1"><div class="txn-name">${t.name}</div><div class="txn-sub">${t.cat} · ${t.src}</div></div><div><div class="txn-amt" style="color:var(--red)">−₪${t.amt.toLocaleString()}</div><div class="txn-date">${t.date}</div></div></div>`).join('')}
  </div></div>`:''}

  ${!totI&&!totE?`<div class="sec"><div class="card"><div class="empty"><div class="empty-icon">👋</div><div class="empty-title">ברוך הבא ל-BOX3.0!</div><div class="empty-sub">לחץ על + למטה כדי להוסיף<br>הוצאה ראשונה ולהתחיל לעקוב</div></div></div></div>`:''}

  <div style="padding:0 14px 14px"><button class="fab" onclick="openM('m-exp')">+ הוסף הוצאה</button></div>`;
}

  <div style="padding:14px">

      ${list.map(t=>`<div class="txn" data-name="${t.name.toLowerCase()}">

      </div>`).join('')}

function searchExp(q){document.querySelectorAll('#exp-list .txn').forEach(t=>{t.style.display=(!q||t.dataset.name.includes(q.toLowerCase()))?'flex':'none'})}
async function delTxn(id){if(!confirm('למחוק?'))return;txns=txns.filter(t=>t.id!==id);await sv('txns',txns);buildExp();buildDash();toast('נמחק ✓')}

let editBCat=null;
function buildBudget(){
  const el=document.getElementById('s-budget');
  const now=new Date();const m=now.getMonth();const y=now.getFullYear();
  const mt=txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y});
  const cats={};mt.forEach(t=>{cats[t.cat]=(cats[t.cat]||0)+t.amt});
  const totB=budgets.reduce((s,b)=>s+b.budget,0);
  const totS=Object.values(cats).reduce((s,v)=>s+v,0);
  const over=budgets.filter(b=>b.budget>0&&(cats[b.n]||0)>b.budget);
  el.innerHTML=`
  <div class="topbar">
    <div class="topbar-row"><div style="font-size:17px;font-weight:700">תקציב — ${MONTHS[m]}</div>${totB>0?`<div style="font-size:12px;opacity:.8">₪${totS.toLocaleString()} / ₪${totB.toLocaleString()}</div>`:''}</div>
    ${totB>0?`<div style="height:7px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;margin-top:10px"><div style="height:100%;border-radius:4px;background:${totS>totB?'#fca5a5':'#86efac'};width:${Math.min(Math.round(totS/totB*100),100)}%;transition:width 1s"></div></div>`:''}
  </div>
  <div style="padding:14px">
    ${over.length?`<div class="alert danger"><div style="font-size:20px">🚨</div><div style="font-size:12px;color:var(--red);line-height:1.5"><div style="font-weight:700;margin-bottom:2px">${over.length} קטגוריות חרגו מהתקציב!</div>${over.map(b=>`${b.n}: חריגה של ₪${((cats[b.n]||0)-b.budget).toLocaleString()}`).join('<br>')}</div></div>`:''}
    ${budgets.map(b=>{
      const spent=cats[b.n]||0;
      const cat=CATS.find(c=>c.n===b.n)||{ic:'📦',c:'#4338ca',bg:'#eef2ff'};
      const pct=b.budget>0?Math.min(Math.round(spent/b.budget*100),100):0;
      const ov=b.budget>0&&spent>b.budget;
      const bc=ov?'var(--red)':pct>80?'var(--amber)':cat.c;
      return`<div class="budget-item" onclick="openBM('${b.n}',${b.budget})">
        <div class="bi-top">
          <div class="bi-icon" style="background:${cat.bg}">${cat.ic}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">${b.n}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${b.budget>0?pct+'% מנוצל':'לחץ להגדרת תקציב'}</div></div>
          <div style="text-align:left">
            <div style="font-size:15px;font-weight:800;color:${ov?'var(--red)':cat.c}">₪${spent.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:1px">${b.budget>0?'מתוך ₪'+b.budget.toLocaleString():'לא הוגדר'}</div>
          </div>
        </div>
        ${b.budget>0?`<div class="bi-track"><div class="bi-fill" style="width:${pct}%;background:${bc}"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600">
          <span style="color:${ov?'var(--red)':'var(--green)'}">${ov?'⚠️ חריגה ₪'+(spent-b.budget).toLocaleString():'✓ נשאר ₪'+(b.budget-spent).toLocaleString()}</span>
          <span style="color:var(--text3)">יעד: ₪${b.budget.toLocaleString()}</span>
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}
function openBM(n,cur){editBCat=n;document.getElementById('bm-title').textContent='תקציב — '+n;document.getElementById('bm-amt').value=cur||'';openM('m-budget')}
async function saveBudget(){const v=parseFloat(document.getElementById('bm-amt').value)||0;const i=budgets.findIndex(b=>b.n===editBCat);if(i>=0)budgets[i].budget=v;await sv('budgets',budgets);closeM('m-budget');buildBudget();toast('תקציב עודכן ✓')}

      <div style="display:flex;gap:10px;margin-bottom:8px">${[['rgba(0,145,110,.6)','הכנסה'],['rgba(192,57,43,.6)','הוצאות']].map(([c,l])=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:${c}"></div><span style="font-size:10px;color:var(--text2);font-weight:600">${l}</span></div>`).join('')}</div>

        ${md.map(d=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"><div style="display:flex;gap:2px;align-items:flex-end;width:100%"><div style="flex:1;border-radius:3px 3px 0 0;background:rgba(0,145,110,.6);height:${Math.round(d.inc/maxV*90)}px;min-height:${d.inc>0?3:0}px"></div><div style="flex:1;border-radius:3px 3px 0 0;background:rgba(192,57,43,.6);height:${Math.round(d.exp/maxV*90)}px;min-height:${d.exp>0?3:0}px"></div></div><div style="font-size:9px;color:var(--text2);font-weight:600">${d.label.slice(0,3)}</div></div>`).join('')}
      </div>
    </div>`:''}
    ${topC.length?`<div class="card pad">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)">הוצאות לפי קטגוריה</div>
      ${topC.map(([cat,amt])=>{const c=CATS.find(x=>x.n===cat)||{c:'#4338ca'};return`<div class="bar-row"><div class="bar-lbl">${cat}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxC*100)}%;background:${c.c}"></div></div><div class="bar-amt">₪${amt.toLocaleString()}</div></div>`;}).join('')}
    </div>`:''}`;
  }
}

let penTab='funds';let editFundId=null;let editInsId=null;
function buildPension(){
  const el=document.getElementById('s-pension');
  const totFunds=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);
  const totMonthly=funds.reduce((s,f)=>s+(parseFloat(f.monthly)||0),0);
  const totIns=insurances.reduce((s,i)=>s+(parseFloat(i.premium)||0),0);
  el.innerHTML=`
  <div class="topbar" style="background:linear-gradient(160deg,#0f2027,#1a3050 55%,#1e4976)">
    <div class="topbar-row" style="margin-bottom:8px"><div style="font-size:17px;font-weight:700">פנסיה וביטוחים</div></div>
    <div style="background:rgba(0,0,0,.25);border-radius:14px;padding:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <div><div style="font-size:11px;opacity:.6;margin-bottom:3px">סה"כ חסכונות</div><div style="font-size:24px;font-weight:800">${totFunds>0?'₪'+totFunds.toLocaleString():'—'}</div><div style="font-size:11px;opacity:.5;margin-top:1px">${funds.length} קרנות</div></div>
        <div style="text-align:left"><div style="font-size:11px;opacity:.6;margin-bottom:3px">הפרשה חודשית</div><div style="font-size:24px;font-weight:800;color:#86efac">${totMonthly>0?'₪'+totMonthly.toLocaleString():'—'}</div><div style="font-size:11px;opacity:.5;margin-top:1px">ביטוחים: ₪${totIns.toLocaleString()}/חודש</div></div>
      </div>
    </div>
  </div>
  <div style="padding:14px">
    <div class="tabs">
      <button class="tab${penTab==='funds'?' active':''}" onclick="penTab='funds';buildPension()">קרנות</button>
      <button class="tab${penTab==='proj'?' active':''}" onclick="penTab='proj';buildPension()">תחזית</button>
      <button class="tab${penTab==='ins'?' active':''}" onclick="penTab='ins';buildPension()">ביטוחים</button>
    </div>
    <div id="pen-content"></div>
  </div>`;
  renderPenTab();
}
function renderPenTab(){
  const el=document.getElementById('pen-content');if(!el)return;
  if(penTab==='funds'){
    el.innerHTML=`
    ${funds.length?funds.map(f=>`<div class="fund-card" onclick="openFundM(${f.id})">
      <div class="fc-top">
        <div class="fc-icon" style="background:${FUND_BG[f.type]||'#eef2ff'}">${FUND_IC[f.type]||'💰'}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">${f.name}</div><div style="font-size:11px;color:var(--text2);margin-top:1px">${f.company} · ${f.type}</div></div>
        <div style="text-align:left"><div style="font-size:16px;font-weight:800;color:${FUND_C[f.type]||'#4338ca'}">${parseFloat(f.balance)>0?'₪'+parseFloat(f.balance).toLocaleString():'—'}</div>${parseFloat(f.ret)>0?`<div style="font-size:11px;font-weight:700;color:var(--green);margin-top:1px">↑ ${f.ret}% שנתי</div>`:''}</div>
      </div>
      <div class="fc-details">
        <div><div class="fcd-val">${parseFloat(f.monthly)>0?'₪'+parseFloat(f.monthly).toLocaleString():'—'}</div><div class="fcd-lbl">הפרשה/חודש</div></div>
        <div><div class="fcd-val">${f.type}</div><div class="fcd-lbl">סוג</div></div>
        <div><div class="fcd-val">${parseFloat(f.ret)>0?f.ret+'%':'—'}</div><div class="fcd-lbl">תשואה</div></div>
      </div>
    </div>`).join(''):`<div class="card"><div class="empty"><div class="empty-icon">🏛️</div><div class="empty-title">אין קרנות עדיין</div><div class="empty-sub">הוסף קרן פנסיה, קרן השתלמות<br>קופת גמל וכל חיסכון</div></div></div>`}
    <button class="fab" style="margin-top:12px" onclick="openFundM(null)">+ הוסף קרן / חיסכון</button>`;
  } else if(penTab==='proj'){
    const totFunds=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);
    el.innerHTML=`<div class="card pad">
      <div style="font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text)">תחזית לפרישה</div>
      <div class="slider-wrap"><div class="slider-lbl"><span>גיל נוכחי</span><span id="p-cur-v">40</span></div><input type="range" min="20" max="65" value="40" id="p-cur" oninput="calcProj()"></div>
      <div class="slider-wrap"><div class="slider-lbl"><span>גיל פרישה</span><span id="p-age-v">67</span></div><input type="range" min="60" max="70" value="67" id="p-age" oninput="calcProj()"></div>
      <div class="slider-wrap"><div class="slider-lbl"><span>תשואה שנתית</span><span id="p-ret-v">6%</span></div><input type="range" min="2" max="12" step="0.5" value="6" id="p-ret" oninput="calcProj()"></div>
      <div class="proj-result">
        ${totFunds>0?`
        <div style="font-size:11px;opacity:.7;margin-bottom:6px">סכום צפוי בפרישה</div>
        <div style="font-size:28px;font-weight:800;color:#3abff8" id="p-total">מחשב...</div>
        <div style="font-size:11px;opacity:.6;margin-top:6px" id="p-sub"></div>
        <div style="display:flex;justify-content:space-around;margin-top:12px">
          <div style="text-align:center"><div style="font-size:13px;font-weight:700" id="p-years">—</div><div style="font-size:10px;opacity:.6;margin-top:1px">שנות חיסכון</div></div>
          <div style="text-align:center"><div style="font-size:13px;font-weight:700" id="p-monthly">—</div><div style="font-size:10px;opacity:.6;margin-top:1px">קצבה/חודש</div></div>
          <div style="text-align:center"><div style="font-size:13px;font-weight:700" id="p-today">₪${totFunds.toLocaleString()}</div><div style="font-size:10px;opacity:.6;margin-top:1px">יתרה היום</div></div>
        </div>`:`<div style="font-size:14px;opacity:.7;padding:10px">הוסף קרן חיסכון כדי לראות תחזית</div>`}
      </div>
    </div>`;
    if(totFunds>0)calcProj();
  } else {
    const totIns=insurances.reduce((s,i)=>s+(parseFloat(i.premium)||0),0);
    el.innerHTML=`
    ${insurances.length?`<div class="card" style="margin-bottom:12px">
      ${insurances.map(i=>`<div class="ins-row" onclick="openInsM(${i.id})">
        <div class="ins-ic" style="background:${INS_BG[i.type]||'#f4f4f8'}">${INS_IC[i.type]||'📋'}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--text)">${i.type}</div><div style="font-size:11px;color:var(--text2);margin-top:1px">${i.company}${i.coverage?' · '+i.coverage:''}</div></div>
        <div style="text-align:left"><div style="font-size:13px;font-weight:700;color:var(--text)">${parseFloat(i.premium)>0?'₪'+parseFloat(i.premium).toLocaleString()+'/חודש':'—'}</div></div>
      </div>`).join('')}
      <div style="padding:12px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between">
        <span style="font-size:13px;color:var(--text2);font-weight:600">סה"כ חודשי</span>
        <span style="font-size:13px;font-weight:800;color:var(--red)">₪${totIns.toLocaleString()}</span>
      </div>
    </div>`:`<div class="card"><div class="empty"><div class="empty-icon">🛡️</div><div class="empty-title">אין ביטוחים</div><div class="empty-sub">הוסף ביטוח חיים, בריאות,<br>סיעוד, דירה ועוד</div></div></div>`}
    <button class="fab" style="margin-top:12px" onclick="openInsM(null)">+ הוסף ביטוח</button>`;
  }
}

function calcProj(){
  const age=parseInt(document.getElementById('p-age').value);
  const cur=parseInt(document.getElementById('p-cur').value);
  const ret=parseFloat(document.getElementById('p-ret').value)/100;
  document.getElementById('p-age-v').textContent=age;
  document.getElementById('p-cur-v').textContent=cur;
  document.getElementById('p-ret-v').textContent=parseFloat(document.getElementById('p-ret').value).toFixed(1)+'%';
  const years=Math.max(age-cur,1);
  const totB=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);
  const totM=funds.reduce((s,f)=>s+(parseFloat(f.monthly)||0),0);
  const r=ret/12;const months=years*12;
  const total=totB*Math.pow(1+ret,years)+totM*((Math.pow(1+r,months)-1)/r);
  const pension=Math.round(total/300);
  if(document.getElementById('p-total')){
    document.getElementById('p-total').textContent='₪'+(total/1000).toFixed(0)+'K';
    document.getElementById('p-sub').textContent='קצבה חודשית משוערת: ₪'+pension.toLocaleString();
    document.getElementById('p-years').textContent=years+' שנה';
    document.getElementById('p-monthly').textContent='₪'+pension.toLocaleString();
  }
}
