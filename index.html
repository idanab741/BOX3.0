<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BOX3.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f7;--card:#ffffff;--card2:#f8f9fc;
  --primary:#4338ca;--pl:#6d66e8;--primary-dark:#3730a3;
  --green:#00916e;--green-bg:#e8faf6;
  --red:#c0392b;--red-bg:#fef0ec;
  --blue:#0969da;--blue-bg:#e8f4fd;
  --amber:#b45309;--amber-bg:#fef9e7;
  --purple:#7c3aed;--purple-bg:#f0eeff;
  --text:#1a1a2e;--text2:#555570;--text3:#9090aa;
  --border:#e4e6f0;--border2:#d0d3e8;
  --shadow:0 2px 8px rgba(0,0,0,.08);
  --radius:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;padding-bottom:88px}
.screen::-webkit-scrollbar{display:none}
.auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;min-height:100vh}
.auth-logo{font-size:48px;margin-bottom:8px}
.auth-title{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:4px;letter-spacing:-1px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.auth-card{background:var(--card);border-radius:20px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.1);padding:24px;width:100%;max-width:360px}
.auth-tab-row{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:20px}
.auth-tab{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:inherit;color:var(--text2);background:transparent;transition:all .2s}
.auth-tab.active{background:var(--primary);color:#fff}
.auth-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;display:block}
.auth-input{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;direction:rtl;margin-bottom:12px;-webkit-appearance:none}
.auth-input:focus{border-color:var(--primary)}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.auth-error{background:var(--red-bg);border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.topbar{background:linear-gradient(160deg,#1e1b4b,#312e81 55%,#4338ca);padding:16px 18px 22px;color:#fff}
.topbar-row{display:flex;justify-content:space-between;align-items:center}
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:10px 0 max(14px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.35;transition:opacity .2s}
.nav-item.active{opacity:1}
.nav-item .ni{font-size:22px}
.nav-item .nl{font-size:10px;font-weight:700;color:var(--primary)}
.nav-item:not(.active) .nl{color:var(--text3)}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.pad{padding:16px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.kpi{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s}
.kpi:active{transform:scale(.97)}
.kpi-icon{font-size:22px;margin-bottom:6px}
.kpi-lbl{font-size:11px;color:var(--text2);font-weight:600}
.kpi-val{font-size:22px;font-weight:800;letter-spacing:-.5px;margin:3px 0}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px}
.sec{padding:0 14px;margin-bottom:14px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-hdr h2{font-size:14px;font-weight:700;color:var(--text)}
.sec-hdr a{font-size:12px;color:var(--primary);cursor:pointer;font-weight:600}
.txn{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border)}
.txn:last-child{border-bottom:none}
.txn-ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.txn-name{font-size:13px;font-weight:600;color:var(--text)}
.txn-sub{font-size:11px;color:var(--text2);margin-top:1px}
.txn-amt{font-size:14px;font-weight:800;text-align:left}
.txn-date{font-size:10px;color:var(--text3);text-align:left}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bar-lbl{font-size:11px;color:var(--text2);width:72px;text-align:right;font-weight:600}
.bar-track{flex:1;height:7px;background:#e8eaf4;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
.bar-amt{font-size:11px;color:var(--text2);width:62px;text-align:left;font-weight:600}
.goal-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.goal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.goal-name{font-size:13px;font-weight:700;color:var(--text)}
.goal-amt{font-size:13px;font-weight:800}
.goal-track{height:8px;background:#e8eaf4;border-radius:4px;overflow:hidden}
.goal-fill{height:100%;border-radius:4px;transition:width .8s ease}
.goal-footer{display:flex;justify-content:space-between;margin-top:6px;font-size:11px}
.budget-item{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.bi-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bi-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bi-track{height:7px;background:#e8eaf4;border-radius:4px;overflow:hidden;margin-bottom:6px}
.bi-fill{height:100%;border-radius:4px;transition:width .8s ease}
.debt-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.debt-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.debt-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.debt-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.debt-track{flex:1;height:7px;background:#e8eaf4;border-radius:4px;overflow:hidden}
.debt-fill{height:100%;border-radius:4px;background:var(--red)}
.forecast-card{background:linear-gradient(135deg,#1e1b4b,#4338ca);border-radius:14px;padding:14px 16px;margin-bottom:10px;color:#fff}
.fc-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.12);font-size:13px}
.fc-row:last-child{border-bottom:none}
.tabs{display:flex;background:var(--card);border-radius:12px;padding:4px;gap:4px;margin-bottom:12px;border:1px solid var(--border)}
.tab{flex:1;padding:8px;border-radius:9px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:inherit;color:var(--text2);background:transparent;transition:all .2s}
.tab.active{background:var(--primary);color:#fff}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.chip.active{background:var(--primary);color:#fff}
.chip:not(.active){background:var(--card);color:var(--text2);border:1px solid var(--border)}
.search{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:12px;padding:10px 14px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.search input{border:none;outline:none;font-family:inherit;font-size:13px;flex:1;color:var(--text);background:transparent;direction:rtl}
.search input::placeholder{color:var(--text3)}
.fund-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.fc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fc-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fc-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding-top:10px;border-top:1px solid var(--border)}
.fcd-val{font-size:12px;font-weight:700;color:var(--text);text-align:center}
.fcd-lbl{font-size:10px;color:var(--text3);margin-top:1px;text-align:center}
.ins-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.ins-row:last-child{border-bottom:none}
.ins-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:12px;box-shadow:var(--shadow)}
.alert{border-radius:12px;padding:12px 14px;display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.alert.warn{background:var(--amber-bg);border:1px solid #fde68a}
.alert.danger{background:var(--red-bg);border:1px solid #fca5a5}
.empty{text-align:center;padding:36px 20px}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:12px;color:var(--text3);line-height:1.6}
.fab{width:calc(100% - 28px);margin:0 14px;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(67,56,202,.35)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:20px 18px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal::-webkit-scrollbar{display:none}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;color:var(--text)}
.modal-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;letter-spacing:.3px;display:block}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;direction:rtl;-webkit-appearance:none;margin-bottom:4px}
.modal-input:focus{border-color:var(--primary)}
.modal-select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none;direction:rtl;-webkit-appearance:none}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-cancel{flex:1;background:var(--bg);color:var(--text2);border:1px solid var(--border);border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-save{flex:2;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.modal-delete{width:100%;background:var(--red-bg);color:var(--red);border:1px solid #fca5a5;border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);background:var(--bg);border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.nk{padding:17px 0;text-align:center;font-size:20px;font-weight:600;cursor:pointer;border-left:1px solid var(--border);border-bottom:1px solid var(--border);user-select:none;transition:background .1s;color:var(--text)}
.nk:active{background:var(--border)}
.nk:nth-child(3n+1){border-left:none}
.nk.spec{color:var(--primary);font-size:14px}
.amount-big{text-align:center;padding:14px;font-size:42px;font-weight:800;letter-spacing:-2px;min-height:66px;color:var(--text)}
.amount-big .cur{font-size:22px;color:var(--text3);font-weight:500}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 4px;border-radius:12px;border:2px solid transparent;transition:all .15s;background:transparent}
.cat-btn.sel{border-color:var(--primary);background:rgba(67,56,202,.08)}
.cat-btn-ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px}
.cat-btn-lbl{font-size:10px;font-weight:600;color:var(--text2);text-align:center}
.slider-wrap{margin-bottom:14px}
.slider-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.slider-lbl span:last-child{font-weight:700;color:var(--primary)}
input[type=range]{width:100%;accent-color:var(--primary)}
.proj-result{background:linear-gradient(135deg,#1e1b4b,#4338ca);border-radius:12px;padding:16px;text-align:center;margin-top:8px;color:#fff}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
.loader-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loader-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── HOME ── */
.home-hero{background:linear-gradient(160deg,#1e1b4b,#312e81 55%,#4338ca);padding:22px 18px 28px;color:#fff}
.home-balance-lbl{font-size:11px;opacity:.55;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.home-balance-val{font-size:40px;font-weight:900;letter-spacing:-2px;line-height:1;cursor:pointer}
.home-balance-sub{font-size:12px;opacity:.55;margin-top:6px}
.home-chips-row{display:flex;gap:10px;margin-top:18px}
.home-chip{flex:1;background:rgba(255,255,255,.12);border-radius:14px;padding:11px 10px;text-align:center;border:1px solid rgba(255,255,255,.1)}
.home-chip-val{font-size:15px;font-weight:800}
.home-chip-lbl{font-size:10px;opacity:.6;margin-top:2px}
.gauge-wrap{padding:14px}
.gauge-card{background:var(--card);border-radius:18px;border:1px solid var(--border);padding:18px;box-shadow:var(--shadow)}
.gauge-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.gauge-sub{font-size:11px;color:var(--text3);margin-bottom:14px}
.gauge-track{height:24px;background:#f0f0f8;border-radius:12px;overflow:visible;position:relative;box-shadow:inset 0 2px 4px rgba(0,0,0,.08)}
.gauge-fill{height:100%;border-radius:12px;transition:width 1s cubic-bezier(.34,1.56,.64,1);position:relative}
.gauge-fill::after{content:'';position:absolute;top:4px;left:8px;right:8px;height:5px;background:rgba(255,255,255,.4);border-radius:3px}
.gauge-needle{position:absolute;top:-4px;width:4px;height:32px;background:#1a1a2e;border-radius:2px;transform:translateX(-50%);box-shadow:0 1px 4px rgba(0,0,0,.35);transition:left 1s cubic-bezier(.34,1.56,.64,1)}
.gauge-markers{display:flex;justify-content:space-between;margin-top:6px;padding:0 2px}
.gauge-marker{font-size:9px;color:var(--text3);font-weight:600}
.gauge-legend{display:flex;gap:14px;margin-top:10px;justify-content:center;flex-wrap:wrap}
.gauge-status{margin-top:10px;text-align:center;padding:8px 0;border-radius:10px;font-size:13px;font-weight:700}
.summary-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.summary-row:last-child{border-bottom:none}
.summary-ic{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.goal-mini{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;box-shadow:var(--shadow);cursor:pointer}
.goal-mini-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.goal-mini-track{height:10px;background:#eef0f8;border-radius:6px;overflow:hidden;margin-bottom:6px}
.goal-mini-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#4338ca,#7c3aed);transition:width 1s ease}
.goal-mini-footer{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- AUTH -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-logo">📦</div>
    <div class="auth-title">BOX3.0</div>
    <div class="auth-sub">ניהול כספים משפחתי</div>
    <div class="auth-card">
      <div class="auth-tab-row">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">כניסה</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">הרשמה</button>
      </div>
      <div id="auth-error" class="auth-error"></div>
      <label class="auth-label">אימייל</label>
      <input class="auth-input" id="auth-email" type="email" placeholder="mail@example.com" autocomplete="email">
      <label class="auth-label">סיסמה</label>
      <input class="auth-input" id="auth-pass" type="password" placeholder="לפחות 6 תווים" autocomplete="current-password">
      <div id="auth-name-wrap" style="display:none">
        <label class="auth-label">שם המשפחה / הזוג</label>
        <input class="auth-input" id="auth-name" type="text" placeholder="משפחת כהן, נועה ויובל...">
      </div>
      <button class="auth-btn" id="auth-submit-btn" onclick="doAuth()">כניסה</button>
      <div style="margin-top:14px;font-size:11px;color:var(--text3);text-align:center;line-height:1.6">
        💡 בני זוג ומשפחה — הירשמו עם <strong>אותו אימייל וסיסמה</strong><br>כדי לשתף את אותם הנתונים
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" style="display:none;flex:1;flex-direction:column">
    <div class="screen" id="s-home" style="display:block"></div>
    <div class="screen" id="s-exp"  style="display:none"></div>
    <div class="screen" id="s-inc"  style="display:none"></div>
    <div class="screen" id="s-budget" style="display:none"></div>
    <div class="screen" id="s-track"  style="display:none"></div>
    <div class="screen" id="s-pension" style="display:none"></div>
    <nav class="navbar">
      <div class="nav-item active" onclick="nav('home',this)"><div class="ni">🏠</div><div class="nl">בית</div></div>
      <div class="nav-item" onclick="nav('exp',this)"><div class="ni">💸</div><div class="nl">הוצאות</div></div>
      <div class="nav-item" onclick="nav('inc',this)"><div class="ni">💰</div><div class="nl">הכנסות</div></div>
      <div class="nav-item" onclick="nav('budget',this)"><div class="ni">🎯</div><div class="nl">תקציב</div></div>
      <div class="nav-item" onclick="nav('track',this)"><div class="ni">📈</div><div class="nl">מעקב</div></div>
      <div class="nav-item" onclick="nav('pension',this)"><div class="ni">🏛️</div><div class="nl">פנסיה</div></div>
    </nav>
  </div>

  <!-- MODALS -->
  <div class="modal-overlay" id="m-exp">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, updateDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD4qIs4VzS5CZSAaFeZL-q0cXyt9TxfMdo",
  authDomain: "box3-0.firebaseapp.com",
  projectId: "box3-0",
  storageBucket: "box3-0.firebasestorage.app",
  messagingSenderId: "702274544895",
  appId: "1:702274544895:web:e42f6237c30b95462e98ca"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
let currentUID = null, unsubscribe = null;

onAuthStateChanged(auth, user => {
  if (user) {
    currentUID = user.uid;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    listenToData(user.uid);
  } else {
    currentUID = null;
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
  }
});

window.switchAuthTab = function(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('auth-name-wrap').style.display = tab==='register'?'block':'none';
  document.getElementById('auth-submit-btn').textContent = tab==='register'?'הרשמה':'כניסה';
  document.getElementById('auth-error').style.display = 'none';
  window._authTab = tab;
};
window._authTab = 'login';

window.doAuth = async function() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  document.getElementById('auth-error').style.display = 'none';
  if (!email || !pass) { showErr('נא למלא אימייל וסיסמה'); return; }
  try {
    showLoader(true);
    if (window._authTab === 'register') {
      const name = document.getElementById('auth-name').value.trim() || 'המשפחה שלנו';
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db,'users',cred.user.uid), {
        familyName: name, checkingBalance: 0,
        txns:[], incomes:[], budgets: CATS.map(c=>({n:c.n,budget:0})),
        goals:[], debts:[], funds:[], insurances:[]
      });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    showLoader(false);
    const msgs = {'auth/email-already-in-use':'האימייל כבר קיים.','auth/invalid-email':'אימייל לא תקין','auth/weak-password':'סיסמה חלשה מדי','auth/invalid-credential':'אימייל או סיסמה שגויים'};
    showErr(msgs[e.code] || 'שגיאה: '+e.message);
  }
};

function showErr(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = 'block';
}

function listenToData(uid) {
  showLoader(true);
  unsubscribe = onSnapshot(doc(db,'users',uid), snap => {
    if (!snap.exists()) { showLoader(false); return; }
    const d = snap.data();
    txns            = d.txns            || [];
    incomes         = d.incomes         || [];
    budgets         = d.budgets         || CATS.map(c=>({n:c.n,budget:0}));
    goals           = d.goals           || [];
    debts           = d.debts           || [];
    funds           = d.funds           || [];
    insurances      = d.insurances      || [];
    checkingBalance = d.checkingBalance || 0;
    familyName      = d.familyName      || '';
    showLoader(false);
    const active = document.querySelector('.screen[style*="block"]');
    if (active) {
      const id = active.id.replace('s-','');
      ({home:buildHome,exp:buildExp,inc:buildIncomesScreen,budget:buildBudget,track:buildTrack,pension:buildPension})[id]?.();
    }
  }, err => { showLoader(false); console.error(err); });
}

async function saveToCloud(data) {
  if (!currentUID) return;
  try {
    await updateDoc(doc(db,'users',currentUID), data);
  } catch(e) {
    await setDoc(doc(db,'users',currentUID), Object.assign(
      {txns, incomes, budgets, goals, debts, funds, insurances, checkingBalance}, data
    ));
  }
}

window.sv = async function(key, val) { await saveToCloud({[key]: val}); };

window.signOutUser = async function() {
  if (!confirm('להתנתק?')) return;
  await signOut(auth);
};

function showLoader(show) {
  document.getElementById('loader').style.display = show ? 'flex' : 'none';
}
</script>

function buildHome(){
  const el = document.getElementById('s-home');
  const now = new Date();
  const m = now.getMonth(), y = now.getFullYear();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const daysLeft = daysInMonth - now.getDate();
  const mt = txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y;});
  const mi = incomes.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y;});
  const totE = mt.reduce((s,t)=>s+t.amt,0);
  const totI = mi.reduce((s,t)=>s+t.amt,0);
  const netMonth = totI - totE;
  const totBudget = budgets.reduce((s,b)=>s+b.budget,0);
  const gaugePct = totBudget>0 ? Math.min(Math.round(totE/totBudget*100),100) : (totE>0?50:0);
  let gColor, gLabel, gBg, gTxt;
  if(gaugePct<50){gColor='linear-gradient(90deg,#00916e,#34d399)';gLabel='✅ מצוין';gBg='var(--green-bg)';gTxt='var(--green)';}
  else if(gaugePct<75){gColor='linear-gradient(90deg,#f59e0b,#fbbf24)';gLabel='⚡ שים לב';gBg='var(--amber-bg)';gTxt='var(--amber)';}
  else if(gaugePct<90){gColor='linear-gradient(90deg,#f97316,#fb923c)';gLabel='⚠️ גבול';gBg='#fff1eb';gTxt='#c2410c';}
  else{gColor='linear-gradient(90deg,#c0392b,#ef4444)';gLabel='🚨 חריגה!';gBg='var(--red-bg)';gTxt='var(--red)';}
  const topGoal = goals.length ? goals[0] : null;
  const goalTarget = topGoal ? parseFloat(topGoal.target)||0 : 0;
  const goalSaved  = topGoal ? parseFloat(topGoal.saved)||0  : 0;
  const goalPct    = goalTarget>0 ? Math.min(Math.round(goalSaved/goalTarget*100),100) : 0;
  const totFunds = funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);
  const greeting = now.getHours()<12?'בוקר טוב':'שלום';

  el.innerHTML =
  '<div class="home-hero">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">' +
      '<div><div style="font-size:12px;opacity:.5;margin-bottom:2px">'+greeting+(familyName?' — '+familyName:'')+'</div>' +
      '<div style="font-size:12px;opacity:.4">'+MONTHS[m]+' '+y+' · יום '+now.getDate()+'</div></div>' +
      '<span onclick="signOutUser()" style="font-size:11px;cursor:pointer;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px">יציאה</span>' +
    '</div>' +
    '<div class="home-balance-lbl">יתרת עו"ש</div>' +
    '<div class="home-balance-val" onclick="openM(\'m-checking\');document.getElementById(\'checking-val\').value=checkingBalance||\'\'">'+

async function saveExp(){

  if(!name)return toast('הכנס שם',1);
  const cat=CATS.find(c=>c.n===selCat)||CATS[0];

let editIncId=null;
function openIncM(id){
  editIncId=id;
  const inc=id?incomes.find(x=>x.id===id):null;
  document.getElementById('inc-title').textContent=inc?'עריכת הכנסה':'הכנסה חדשה';
  document.getElementById('inc-amt').value=inc?inc.amt:'';
  document.getElementById('inc-src').value=inc?inc.src:'';
  document.getElementById('inc-date').value=inc?inc.date:'';
  document.getElementById('inc-del').style.display=inc?'block':'none';
  openM('m-inc');
}
async function saveInc(){
  const amt=parseFloat(document.getElementById('inc-amt').value);
  if(!amt||amt<=0)return toast('הכנס סכום',1);
  const src=document.getElementById('inc-src').value.trim()||'הכנסה';
  const date=document.getElementById('inc-date').value.trim()||new Date().toLocaleDateString('he-IL');
  if(editIncId){const i=incomes.findIndex(x=>x.id===editIncId);if(i>=0)incomes[i]=Object.assign({},incomes[i],{amt,src,date});}
  else incomes.unshift({id:Date.now(),amt,src,date});
  await sv('incomes',incomes);
  document.getElementById('inc-amt').value='';document.getElementById('inc-src').value='';document.getElementById('inc-date').value='';
  closeM('m-inc');buildHome();
  if(document.getElementById('s-inc').style.display!=='none')buildIncomesScreen();

async function deleteInc(){
  if(!confirm('למחוק?'))return;
  incomes=incomes.filter(x=>x.id!==editIncId);
  await sv('incomes',incomes);closeM('m-inc');buildHome();
  if(document.getElementById('s-inc').style.display!=='none')buildIncomesScreen();
  toast('נמחק ✓');
}

let editBCat=null;
function buildBudget(){
  const el=document.getElementById('s-budget');
  const now=new Date();const m=now.getMonth();const y=now.getFullYear();
  const mt=txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y;});
  const cats={};mt.forEach(t=>{cats[t.cat]=(cats[t.cat]||0)+t.amt;});
  const totB=budgets.reduce((s,b)=>s+b.budget,0);
  const totS=Object.values(cats).reduce((s,v)=>s+v,0);
  const over=budgets.filter(b=>b.budget>0&&(cats[b.n]||0)>b.budget);
  el.innerHTML='<div class="topbar"><div class="topbar-row"><div style="font-size:17px;font-weight:700">תקציב — '+MONTHS[m]+'</div>'+(totB>0?'<div style="font-size:12px;opacity:.8">₪'+totS.toLocaleString()+' / ₪'+totB.toLocaleString()+'</div>':'')+'</div>'+(totB>0?'<div style="height:7px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;margin-top:10px"><div style="height:100%;border-radius:4px;background:'+(totS>totB?'#fca5a5':'#86efac')+';width:'+Math.min(Math.round(totS/totB*100),100)+'%;transition:width 1s"></div></div>':'')+'</div><div style="padding:14px">'+(over.length?'<div class="alert danger"><div style="font-size:20px">🚨</div><div style="font-size:12px;color:var(--red);line-height:1.5"><div style="font-weight:700;margin-bottom:2px">'+over.length+' קטגוריות חרגו!</div>'+over.map(b=>b.n+': ₪'+((cats[b.n]||0)-b.budget).toLocaleString()).join('<br>')+'</div></div>':'')+budgets.map(b=>{const spent=cats[b.n]||0;const cat=CATS.find(c=>c.n===b.n)||{ic:'📦',c:'#4338ca',bg:'#eef2ff'};const pct=b.budget>0?Math.min(Math.round(spent/b.budget*100),100):0;const ov=b.budget>0&&spent>b.budget;const bc=ov?'var(--red)':pct>80?'var(--amber)':cat.c;return'<div class="budget-item" onclick="openBM(\''+b.n+'\','+b.budget+')"><div class="bi-top"><div class="bi-icon" style="background:'+cat.bg+'">'+cat.ic+'</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">'+b.n+'</div><div style="font-size:11px;color:var(--text2);margin-top:2px">'+(b.budget>0?pct+'% מנוצל':'לחץ להגדרת תקציב')+'</div></div><div style="text-align:left"><div style="font-size:15px;font-weight:800;color:'+(ov?'var(--red)':cat.c)+'">₪'+spent.toLocaleString()+'</div><div style="font-size:10px;color:var(--text3);margin-top:1px">'+(b.budget>0?'מתוך ₪'+b.budget.toLocaleString():'לא הוגדר')+'</div></div></div>'+(b.budget>0?'<div class="bi-track"><div class="bi-fill" style="width:'+pct+'%;background:'+bc+'"></div></div><div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600"><span style="color:'+(ov?'var(--red)':'var(--green)')+'">'+(ov?'⚠️ חריגה ₪'+(spent-b.budget).toLocaleString():'✓ נשאר ₪'+(b.budget-spent).toLocaleString())+'</span><span style="color:var(--text3)">יעד: ₪'+b.budget.toLocaleString()+'</span></div>':'')+'</div>';}).join('')+'</div>';

function renderTrackTab(){
  const el=document.getElementById('track-content');if(!el)return;
  if(trackTab==='goals'){
    el.innerHTML=(goals.length?goals.map(g=>{const target=parseFloat(g.target)||0,saved=parseFloat(g.saved)||0,monthly=parseFloat(g.monthly)||0;const pct=target>0?Math.min(Math.round(saved/target*100),100):0;const remain=target-saved;const months=monthly>0?Math.ceil(remain/monthly):null;return'<div class="goal-card" onclick="openGoalM('+g.id+')"><div class="goal-top"><div><div class="goal-name">'+g.name+'</div><div style="font-size:11px;color:var(--text2);margin-top:2px">'+(monthly>0?'₪'+monthly.toLocaleString()+'/חודש':'')+'</div></div><div style="text-align:left"><div class="goal-amt" style="color:var(--primary)">₪'+saved.toLocaleString()+'</div><div style="font-size:10px;color:var(--text3);margin-top:1px">מתוך ₪'+target.toLocaleString()+'</div></div></div><div class="goal-track"><div class="goal-fill" style="width:'+pct+'%;background:'+(pct>=100?'var(--green)':'var(--primary)')+'"></div></div><div class="goal-footer"><span style="font-weight:700;color:'+(pct>=100?'var(--green)':'var(--text2)')+'">🎯 '+pct+'%'+(pct>=100?' — הגעת ליעד!':'')+'</span><span style="color:var(--text3)">'+(pct<100?'נשאר ₪'+remain.toLocaleString()+(months?' · '+months+' חודשים':''):'')+'</span></div></div>';}).join(''):'<div class="card"><div class="empty"><div class="empty-icon">🎯</div><div class="empty-title">אין יעדי חיסכון</div></div></div>')+'<button class="fab" style="margin-top:12px" onclick="openGoalM(null)">+ הוסף יעד חיסכון</button>';
  } else if(trackTab==='debts'){
    const totDebt=debts.reduce((s,d)=>s+(parseFloat(d.remain)||0),0);
    const totM=debts.reduce((s,d)=>s+(parseFloat(d.monthly)||0),0);
    el.innerHTML=(debts.length?'<div class="card pad" style="margin-bottom:12px;background:linear-gradient(135deg,#fef0ec,#fff0f6);border-color:#fca5a5"><div style="display:flex;justify-content:space-between"><div><div style="font-size:11px;color:var(--text2);font-weight:600;margin-bottom:3px">סה"כ חובות</div><div style="font-size:22px;font-weight:800;color:var(--red)">₪'+totDebt.toLocaleString()+'</div></div><div style="text-align:left"><div style="font-size:11px;color:var(--text2);font-weight:600;margin-bottom:3px">תשלום חודשי</div><div style="font-size:22px;font-weight:800;color:var(--red)">₪'+totM.toLocaleString()+'</div></div></div></div>':'')+(debts.length?debts.map(d=>{const total=parseFloat(d.total)||0,remain=parseFloat(d.remain)||0,monthly=parseFloat(d.monthly)||0;const pct=total>0?Math.round((total-remain)/total*100):0;const months=monthly>0?Math.ceil(remain/monthly):null;return'<div class="debt-card" onclick="openDebtM('+d.id+')"><div class="debt-top"><div class="debt-icon" style="background:var(--red-bg)">💳</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">'+d.name+'</div><div style="font-size:11px;color:var(--text2);margin-top:2px">'+(monthly>0?'₪'+monthly.toLocaleString()+'/חודש':'')+(d.end?' · מסתיים '+d.end:'')+'</div></div><div style="text-align:left"><div style="font-size:15px;font-weight:800;color:var(--red)">₪'+remain.toLocaleString()+'</div></div></div><div class="debt-bar-wrap"><div class="debt-track"><div class="debt-fill" style="width:'+(100-pct)+'%"></div></div><span style="font-size:10px;color:var(--text3)">'+pct+'% שולם</span></div>'+(months?'<div style="font-size:11px;color:var(--text2);font-weight:600">סיום משוער בעוד '+months+' חודשים</div>':'')+'</div>';}).join(''):'<div class="card"><div class="empty"><div class="empty-icon">✅</div><div class="empty-title">אין חובות רשומים</div></div></div>')+'<button class="fab" style="margin-top:12px" onclick="openDebtM(null)">+ הוסף חוב / הלוואה</button>';
  } else {
    const totE=txns.reduce((s,t)=>s+t.amt,0);
    const totI=incomes.reduce((s,t)=>s+t.amt,0);
    const cats={};txns.forEach(t=>{cats[t.cat]=(cats[t.cat]||0)+t.amt;});
    const topC=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
    const maxC=topC[0]?.[1]||1;
    const now=new Date();
    const mos=[];
    for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);mos.push({m:d.getMonth(),y:d.getFullYear(),label:MONTHS[d.getMonth()]});}
    const md=mos.map(function(x){const mt2=txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===x.m&&d.getFullYear()===x.y;});const mi2=incomes.filter(t=>{const d=new Date(t.id);return d.getMonth()===x.m&&d.getFullYear()===x.y;});return{label:x.label,exp:mt2.reduce((s,t)=>s+t.amt,0),inc:mi2.reduce((s,t)=>s+t.amt,0)};});
    const maxV=Math.max.apply(null,md.map(d=>d.exp).concat(md.map(d=>d.inc)).concat([1]));
    el.innerHTML='<div class="stat-grid"><div class="stat-card"><div style="font-size:20px;margin-bottom:6px">💸</div><div style="font-size:11px;color:var(--text2);font-weight:600">סה"כ הוצאות</div><div style="font-size:18px;font-weight:800;margin-top:2px;color:var(--red)">'+(totE>0?'₪'+totE.toLocaleString():'—')+'</div></div><div class="stat-card"><div style="font-size:20px;margin-bottom:6px">💰</div><div style="font-size:11px;color:var(--text2);font-weight:600">סה"כ הכנסות</div><div style="font-size:18px;font-weight:800;margin-top:2px;color:var(--green)">'+(totI>0?'₪'+totI.toLocaleString():'—')+'</div></div><div class="stat-card"><div style="font-size:20px;margin-bottom:6px">🏦</div><div style="font-size:11px;color:var(--text2);font-weight:600">חיסכון כולל</div><div style="font-size:18px;font-weight:800;margin-top:2px;color:var(--blue)">'+(totI>0||totE>0?'₪'+(totI-totE).toLocaleString():'—')+'</div></div><div class="stat-card"><div style="font-size:20px;margin-bottom:6px">🧾</div><div style="font-size:11px;color:var(--text2);font-weight:600">סה"כ עסקאות</div><div style="font-size:18px;font-weight:800;margin-top:2px;color:var(--purple)">'+txns.length+'</div></div></div>'+(md.some(d=>d.exp>0||d.inc>0)?'<div class="card pad" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text)">6 חודשים אחרונים</div><div style="display:flex;align-items:flex-end;gap:5px;height:90px">'+md.map(d=>'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"><div style="display:flex;gap:2px;align-items:flex-end;width:100%"><div style="flex:1;border-radius:3px 3px 0 0;background:rgba(0,145,110,.6);height:'+Math.round(d.inc/maxV*80)+'px;min-height:'+(d.inc>0?3:0)+'px"></div><div style="flex:1;border-radius:3px 3px 0 0;background:rgba(192,57,43,.6);height:'+Math.round(d.exp/maxV*80)+'px;min-height:'+(d.exp>0?3:0)+'px"></div></div><div style="font-size:9px;color:var(--text2);font-weight:600">'+d.label.slice(0,3)+'</div></div>').join('')+'</div></div>':'')+(topC.length?'<div class="card pad"><div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)">הוצאות לפי קטגוריה</div>'+topC.map(([cat,amt])=>{const c=CATS.find(x=>x.n===cat)||{c:'#4338ca'};return'<div class="bar-row"><div class="bar-lbl">'+cat+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(amt/maxC*100)+'%;background:'+c.c+'"></div></div><div class="bar-amt">₪'+amt.toLocaleString()+'</div></div>';}).join('')+'</div>':'');
  }
}
function openGoalM(id){editGoalId=id;const g=id?goals.find(x=>x.id===id):null;document.getElementById('gm-title').textContent=g?'עריכת יעד':'יעד חיסכון חדש';document.getElementById('gm-name').value=g?g.name:'';document.getElementById('gm-target').value=g?g.target:'';document.getElementById('gm-saved').value=g?g.saved:'';document.getElementById('gm-monthly').value=g?g.monthly:'';document.getElementById('gm-del').style.display=g?'block':'none';openM('m-goal');}
async function saveGoal(){const name=document.getElementById('gm-name').value.trim();if(!name)return toast('הכנס שם',1);const goal={id:editGoalId||Date.now(),name,target:document.getElementById('gm-target').value,saved:document.getElementById('gm-saved').value,monthly:document.getElementById('gm-monthly').value};if(editGoalId){const i=goals.findIndex(g=>g.id===editGoalId);if(i>=0)goals[i]=goal;}else goals.push(goal);await sv('goals',goals);closeM('m-goal');buildTrack();toast('יעד נשמר ✓');}
async function deleteGoal(){if(!confirm('למחוק?'))return;goals=goals.filter(g=>g.id!==editGoalId);await sv('goals',goals);closeM('m-goal');buildTrack();toast('נמחק ✓');}
function openDebtM(id){editDebtId=id;const d=id?debts.find(x=>x.id===id):null;document.getElementById('dm-title').textContent=d?'עריכת חוב':'חוב חדש';document.getElementById('dm-name').value=d?d.name:'';document.getElementById('dm-total').value=d?d.total:'';document.getElementById('dm-remain').value=d?d.remain:'';document.getElementById('dm-monthly').value=d?d.monthly:'';document.getElementById('dm-end').value=d?d.end:'';document.getElementById('dm-del').style.display=d?'block':'none';openM('m-debt');}
async function saveDebt(){const name=document.getElementById('dm-name').value.trim();if(!name)return toast('הכנס שם',1);const debt={id:editDebtId||Date.now(),name,total:document.getElementById('dm-total').value,remain:document.getElementById('dm-remain').value,monthly:document.getElementById('dm-monthly').value,end:document.getElementById('dm-end').value};if(editDebtId){const i=debts.findIndex(d=>d.id===editDebtId);if(i>=0)debts[i]=debt;}else debts.push(debt);await sv('debts',debts);closeM('m-debt');buildTrack();toast('נשמר ✓');}
async function deleteDebt(){if(!confirm('למחוק?'))return;debts=debts.filter(d=>d.id!==editDebtId);await sv('debts',debts);closeM('m-debt');buildTrack();toast('נמחק ✓');}

let penTab='funds',editFundId=null,editInsId=null;
function buildPension(){
  const el=document.getElementById('s-pension');
  const totFunds=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);
  const totMonthly=funds.reduce((s,f)=>s+(parseFloat(f.monthly)||0),0);
  const totIns=insurances.reduce((s,i)=>s+(parseFloat(i.premium)||0),0);
  el.innerHTML='<div class="topbar" style="background:linear-gradient(160deg,#0f2027,#1a3050 55%,#1e4976)"><div class="topbar-row" style="margin-bottom:8px"><div style="font-size:17px;font-weight:700">פנסיה וביטוחים</div></div><div style="background:rgba(0,0,0,.25);border-radius:14px;padding:14px"><div style="display:flex;justify-content:space-between"><div><div style="font-size:11px;opacity:.6;margin-bottom:3px">סה"כ חסכונות</div><div style="font-size:24px;font-weight:800">'+(totFunds>0?'₪'+totFunds.toLocaleString():'—')+'</div><div style="font-size:11px;opacity:.5;margin-top:1px">'+funds.length+' קרנות</div></div><div style="text-align:left"><div style="font-size:11px;opacity:.6;margin-bottom:3px">הפרשה חודשית</div><div style="font-size:24px;font-weight:800;color:#86efac">'+(totMonthly>0?'₪'+totMonthly.toLocaleString():'—')+'</div><div style="font-size:11px;opacity:.5;margin-top:1px">ביטוחים: ₪'+totIns.toLocaleString()+'/חודש</div></div></div></div></div><div style="padding:14px"><div class="tabs"><button class="tab'+(penTab==='funds'?' active':'')+'" onclick="penTab=\'funds\';buildPension()">קרנות</button><button class="tab'+(penTab==='proj'?' active':'')+'" onclick="penTab=\'proj\';buildPension()">תחזית</button><button class="tab'+(penTab==='ins'?' active':'')+'" onclick="penTab=\'ins\';buildPension()">ביטוחים</button></div><div id="pen-content"></div></div>';
  renderPenTab();
}
function renderPenTab(){
  const el=document.getElementById('pen-content');if(!el)return;
  if(penTab==='funds'){
    el.innerHTML=(funds.length?funds.map(f=>'<div class="fund-card" onclick="openFundM('+f.id+')"><div class="fc-top"><div class="fc-icon" style="background:'+(FUND_BG[f.type]||'#eef2ff')+'">'+(FUND_IC[f.type]||'💰')+'</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">'+f.name+'</div><div style="font-size:11px;color:var(--text2);margin-top:1px">'+f.company+' · '+f.type+'</div></div><div style="text-align:left"><div style="font-size:16px;font-weight:800;color:'+(FUND_C[f.type]||'#4338ca')+'">'+(parseFloat(f.balance)>0?'₪'+parseFloat(f.balance).toLocaleString():'—')+'</div>'+(parseFloat(f.ret)>0?'<div style="font-size:11px;font-weight:700;color:var(--green);margin-top:1px">↑ '+f.ret+'% שנתי</div>':'')+'</div></div><div class="fc-details"><div><div class="fcd-val">'+(parseFloat(f.monthly)>0?'₪'+parseFloat(f.monthly).toLocaleString():'—')+'</div><div class="fcd-lbl">הפרשה/חודש</div></div><div><div class="fcd-val">'+f.type+'</div><div class="fcd-lbl">סוג</div></div><div><div class="fcd-val">'+(parseFloat(f.ret)>0?f.ret+'%':'—')+'</div><div class="fcd-lbl">תשואה</div></div></div></div>').join(''):'<div class="card"><div class="empty"><div class="empty-icon">🏛️</div><div class="empty-title">אין קרנות עדיין</div></div></div>')+'<button class="fab" style="margin-top:12px" onclick="openFundM(null)">+ הוסף קרן / חיסכון</button>';
  } else if(penTab==='proj'){
    const totF=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);
    el.innerHTML='<div class="card pad"><div style="font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text)">תחזית לפרישה</div><div class="slider-wrap"><div class="slider-lbl"><span>גיל נוכחי</span><span id="p-cur-v">40</span></div><input type="range" min="20" max="65" value="40" id="p-cur" oninput="calcProj()"></div><div class="slider-wrap"><div class="slider-lbl"><span>גיל פרישה</span><span id="p-age-v">67</span></div><input type="range" min="60" max="70" value="67" id="p-age" oninput="calcProj()"></div><div class="slider-wrap"><div class="slider-lbl"><span>תשואה שנתית</span><span id="p-ret-v">6%</span></div><input type="range" min="2" max="12" step="0.5" value="6" id="p-ret" oninput="calcProj()"></div><div class="proj-result">'+(totF>0?'<div style="font-size:11px;opacity:.7;margin-bottom:6px">סכום צפוי בפרישה</div><div style="font-size:28px;font-weight:800;color:#3abff8" id="p-total">מחשב...</div><div style="font-size:11px;opacity:.6;margin-top:6px" id="p-sub"></div><div style="display:flex;justify-content:space-around;margin-top:12px"><div style="text-align:center"><div style="font-size:13px;font-weight:700" id="p-years">—</div><div style="font-size:10px;opacity:.6;margin-top:1px">שנות חיסכון</div></div><div style="text-align:center"><div style="font-size:13px;font-weight:700" id="p-monthly">—</div><div style="font-size:10px;opacity:.6;margin-top:1px">קצבה/חודש</div></div><div style="text-align:center"><div style="font-size:13px;font-weight:700" id="p-today">₪'+totF.toLocaleString()+'</div><div style="font-size:10px;opacity:.6;margin-top:1px">יתרה היום</div></div></div>':'<div style="font-size:14px;opacity:.7;padding:10px">הוסף קרן חיסכון כדי לראות תחזית</div>')+'</div></div>';
    if(totF>0)calcProj();
  } else {
    const totIns=insurances.reduce((s,i)=>s+(parseFloat(i.premium)||0),0);
    el.innerHTML=(insurances.length?'<div class="card" style="margin-bottom:12px">'+insurances.map(i=>'<div class="ins-row" onclick="openInsM('+i.id+')"><div class="ins-ic" style="background:'+(INS_BG[i.type]||'#f4f4f8')+'">'+(INS_IC[i.type]||'📋')+'</div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--text)">'+i.type+'</div><div style="font-size:11px;color:var(--text2);margin-top:1px">'+i.company+(i.coverage?' · '+i.coverage:'')+'</div></div><div style="text-align:left"><div style="font-size:13px;font-weight:700;color:var(--text)">'+(parseFloat(i.premium)>0?'₪'+parseFloat(i.premium).toLocaleString()+'/חודש':'—')+'</div></div></div>').join('')+'<div style="padding:12px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between"><span style="font-size:13px;color:var(--text2);font-weight:600">סה"כ חודשי</span><span style="font-size:13px;font-weight:800;color:var(--red)">₪'+totIns.toLocaleString()+'</span></div></div>':'<div class="card"><div class="empty"><div class="empty-icon">🛡️</div><div class="empty-title">אין ביטוחים</div></div></div>')+'<button class="fab" style="margin-top:12px" onclick="openInsM(null)">+ הוסף ביטוח</button>';
  }
}
function calcProj(){const age=parseInt(document.getElementById('p-age').value);const cur=parseInt(document.getElementById('p-cur').value);const ret=parseFloat(document.getElementById('p-ret').value)/100;document.getElementById('p-age-v').textContent=age;document.getElementById('p-cur-v').textContent=cur;document.getElementById('p-ret-v').textContent=parseFloat(document.getElementById('p-ret').value).toFixed(1)+'%';const years=Math.max(age-cur,1);const totB=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);const totM=funds.reduce((s,f)=>s+(parseFloat(f.monthly)||0),0);const r=ret/12;const months=years*12;const total=totB*Math.pow(1+ret,years)+totM*((Math.pow(1+r,months)-1)/r);const pension=Math.round(total/300);if(document.getElementById('p-total')){document.getElementById('p-total').textContent='₪'+(total/1000).toFixed(0)+'K';document.getElementById('p-sub').textContent='קצבה חודשית משוערת: ₪'+pension.toLocaleString();document.getElementById('p-years').textContent=years+' שנה';document.getElementById('p-monthly').textContent='₪'+pension.toLocaleString();}}
function openFundM(id){editFundId=id;const f=id?funds.find(x=>x.id===id):null;document.getElementById('fm-title').textContent=f?'עריכת '+f.name:'קרן חדשה';document.getElementById('fm-name').value=f?f.name:'';document.getElementById('fm-company').value=f?f.company:'';document.getElementById('fm-type').value=f?f.type:'קרן פנסיה';document.getElementById('fm-balance').value=f?f.balance:'';document.getElementById('fm-monthly').value=f?f.monthly:'';document.getElementById('fm-return').value=f?f.ret:'';document.getElementById('fm-del').style.display=f?'block':'none';openM('m-fund');}
async function saveFund(){const name=document.getElementById('fm-name').value.trim();if(!name)return toast('הכנס שם',1);const fund={id:editFundId||Date.now(),name,company:document.getElementById('fm-company').value.trim(),type:document.getElementById('fm-type').value,balance:document.getElementById('fm-balance').value,monthly:document.getElementById('fm-monthly').value,ret:document.getElementById('fm-return').value};if(editFundId){const i=funds.findIndex(f=>f.id===editFundId);if(i>=0)funds[i]=fund;}else funds.push(fund);await sv('funds',funds);closeM('m-fund');buildPension();toast('נשמר ✓');}
async function deleteFund(){if(!confirm('למחוק?'))return;funds=funds.filter(f=>f.id!==editFundId);await sv('funds',funds);closeM('m-fund');buildPension();toast('נמחק ✓');}
function openInsM(id){editInsId=id;const i=id?insurances.find(x=>x.id===id):null;document.getElementById('im-title').textContent=i?'עריכת ביטוח':'ביטוח חדש';document.getElementById('im-type').value=i?i.type:'ביטוח חיים';document.getElementById('im-company').value=i?i.company:'';document.getElementById('im-premium').value=i?i.premium:'';document.getElementById('im-coverage').value=i?i.coverage:'';document.getElementById('im-del').style.display=i?'block':'none';openM('m-ins');}
async function saveIns(){const company=document.getElementById('im-company').value.trim();if(!company)return toast('הכנס חברה',1);const ins={id:editInsId||Date.now(),type:document.getElementById('im-type').value,company,premium:document.getElementById('im-premium').value,coverage:document.getElementById('im-coverage').value};if(editInsId){const i=insurances.findIndex(x=>x.id===editInsId);if(i>=0)insurances[i]=ins;}else insurances.push(ins);await sv('insurances',insurances);closeM('m-ins');buildPension();toast('נשמר ✓');}
async function deleteIns(){if(!confirm('למחוק?'))return;insurances=insurances.filter(i=>i.id!==editInsId);await sv('insurances',insurances);closeM('m-ins');buildPension();toast('נמחק ✓');}
</script>
