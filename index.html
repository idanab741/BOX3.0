<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOX3.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F8FC;
  --surface:#FFFFFF;
  --surface2:#F0F2F8;
  --ink:#0D0F1A;
  --ink2:#5A5E7A;
  --ink3:#A0A4BC;
  --accent:#5B5FEF;
  --accent2:#818CF8;
  --accentBg:#EEF0FE;
  --green:#00A878;
  --greenBg:#E6F7F3;
  --red:#E5484D;
  --redBg:#FEF0F0;
  --amber:#D97706;
  --amberBg:#FEF9EC;
  --border:#E8EAF4;
  --shadow:0 1px 3px rgba(13,15,26,.06), 0 4px 16px rgba(13,15,26,.04);
  --shadowLg:0 8px 32px rgba(13,15,26,.10), 0 2px 8px rgba(13,15,26,.06);
  --r:16px;
  --r-sm:10px;
  --r-lg:22px;
}
html,body{height:100%;background:var(--bg)}
body{font-family:'Heebo',system-ui,sans-serif;color:var(--ink);display:flex;justify-content:center;min-height:100vh}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative}
.screen{flex:1;overflow-y:auto;padding-bottom:90px;scroll-behavior:smooth}
.screen::-webkit-scrollbar{display:none}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;background:var(--bg)}
.auth-brand{margin-bottom:36px;text-align:center}
.auth-brand-icon{width:64px;height:64px;background:var(--accent);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px;box-shadow:0 8px 24px rgba(91,95,239,.3)}
.auth-brand-name{font-size:26px;font-weight:900;color:var(--ink);letter-spacing:-1px}
.auth-brand-sub{font-size:13px;color:var(--ink3);margin-top:3px;font-weight:400}
.auth-card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadowLg);padding:28px 24px;width:100%}
.auth-tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.auth-tab{flex:1;padding:10px;border-radius:9px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:inherit;color:var(--ink3);background:transparent;transition:all .2s}
.auth-tab.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.auth-lbl{font-size:11px;color:var(--ink3);font-weight:600;margin-bottom:6px;display:block;letter-spacing:.3px}
.auth-inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:15px;font-family:inherit;color:var(--ink);outline:none;direction:rtl;margin-bottom:12px;transition:border-color .2s;-webkit-appearance:none}
.auth-inp:focus{border-color:var(--accent);background:#fff}
.auth-err{background:var(--redBg);border:1px solid #fca5a5;border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:12px;display:none;font-weight:500}
.auth-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .2s;letter-spacing:-.2px}
.auth-btn:active{opacity:.85}
.auth-hint{margin-top:16px;font-size:11px;color:var(--ink3);text-align:center;line-height:1.7}

/* ── NAV ── */
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(14px,env(safe-area-inset-bottom));z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;transition:opacity .15s}
.ni .ico{width:40px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:background .15s}
.ni .lbl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.2px}
.ni.active .ico{background:var(--accentBg)}
.ni.active .lbl{color:var(--accent)}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow)}
.pad{padding:18px}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;backdrop-filter:blur(20px)}
.topbar-title{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
.exit-btn{font-size:12px;color:var(--ink3);cursor:pointer;font-weight:600;background:var(--bg);padding:6px 12px;border-radius:20px;border:1px solid var(--border)}

/* ── HERO CARD (home) ── */
.hero{background:var(--accent);border-radius:var(--r-lg);margin:16px;padding:22px 20px 24px;color:#fff;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(91,95,239,.25)}
.hero::before{content:'';position:absolute;top:-40px;left:-40px;width:180px;height:180px;background:rgba(255,255,255,.07);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-20px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,.05);border-radius:50%}
.hero-lbl{font-size:11px;font-weight:600;opacity:.65;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;position:relative}
.hero-val{font-size:38px;font-weight:900;letter-spacing:-2px;line-height:1;position:relative;cursor:pointer}
.hero-val-sub{font-size:12px;opacity:.6;margin-top:8px;position:relative}
.hero-pills{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:18px;position:relative}
.hero-pill{background:rgba(255,255,255,.12);border-radius:12px;padding:10px 8px;text-align:center;border:1px solid rgba(255,255,255,.1)}
.hero-pill-val{font-size:14px;font-weight:800;line-height:1}
.hero-pill-lbl{font-size:9px;opacity:.6;margin-top:3px;font-weight:500;letter-spacing:.2px}

/* ── SECTION ── */
.section{padding:0 16px;margin-bottom:20px}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:-.2px}
.section-link{font-size:12px;color:var(--accent);font-weight:600;cursor:pointer}

/* ── GAUGE ── */
.gauge-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:18px;overflow:hidden}
.gauge-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.gauge-pct-badge{background:var(--accentBg);color:var(--accent);font-size:13px;font-weight:800;padding:4px 10px;border-radius:20px}
.gauge-bar-wrap{height:12px;background:var(--bg);border-radius:8px;overflow:hidden;position:relative;margin-bottom:8px}
.gauge-bar{height:100%;border-radius:8px;transition:width 1.2s cubic-bezier(.34,1.2,.64,1)}
.gauge-ticks{display:flex;justify-content:space-between;padding:0 1px}
.gauge-tick{font-size:9px;color:var(--ink3);font-weight:500}
.gauge-status-bar{margin-top:12px;padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px}

/* ── SUMMARY ROWS ── */
.sum-row{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;margin-left:12px}
.sum-name{font-size:13px;font-weight:600;color:var(--ink)}
.sum-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.sum-val{font-size:15px;font-weight:800;margin-right:auto}

/* ── GOAL MINI ── */
.goal-mini{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px;cursor:pointer}
.goal-mini-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.goal-mini-name{font-size:13px;font-weight:700;color:var(--ink)}
.goal-mini-pct{font-size:12px;font-weight:800;color:var(--accent);background:var(--accentBg);padding:3px 8px;border-radius:20px}
.goal-mini-bar{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:7px}
.goal-mini-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s ease}
.goal-mini-footer{display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);font-weight:500}

/* ── TXN LIST ── */
.txn-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.txn-row:last-child{border-bottom:none}
.txn-ico{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-left:12px}
.txn-name{font-size:13px;font-weight:600;color:var(--ink)}
.txn-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.txn-amt{font-size:14px;font-weight:800;margin-right:auto}
.txn-date{font-size:10px;color:var(--ink3);margin-right:auto;margin-top:2px}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px}
.kpi{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow);cursor:pointer}
.kpi-ico{font-size:20px;margin-bottom:8px}
.kpi-lbl{font-size:11px;color:var(--ink3);font-weight:600;margin-bottom:3px}
.kpi-val{font-size:20px;font-weight:900;letter-spacing:-.5px}
.kpi-sub{font-size:10px;color:var(--ink3);margin-top:3px}

/* ── BAR CHART ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{font-size:11px;color:var(--ink2);width:68px;text-align:right;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:6px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
.bar-amt{font-size:11px;color:var(--ink2);width:58px;text-align:left;font-weight:600}

/* ── BUDGET ── */
.bud-item{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.bud-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bud-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bud-bar{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:7px}
.bud-fill{height:100%;border-radius:4px;transition:width .8s ease}

/* ── GOAL / DEBT CARDS ── */
.goal-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.debt-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.debt-bar{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;margin:10px 0 6px}
.debt-fill{height:100%;border-radius:4px;background:var(--red);transition:width .8s}

/* ── FUND ── */
.fund-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
.fund-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.fund-ico{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fund-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
.fcd{text-align:center}
.fcd-val{font-size:12px;font-weight:700;color:var(--ink)}
.fcd-lbl{font-size:10px;color:var(--ink3);margin-top:2px}
.ins-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.ins-row:last-child{border-bottom:none}
.ins-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;gap:3px;margin-bottom:16px}
.tab{flex:1;padding:9px;border-radius:9px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:inherit;color:var(--ink3);background:transparent;transition:all .2s}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── CHIPS ── */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:1.5px solid var(--border);font-family:inherit;transition:all .15s;background:var(--surface);color:var(--ink3)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── SEARCH ── */
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:12px;padding:11px 14px;margin-bottom:14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.search input{border:none;outline:none;font-family:inherit;font-size:13px;flex:1;color:var(--ink);background:transparent;direction:rtl}
.search input::placeholder{color:var(--ink3)}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;box-shadow:var(--shadow)}

/* ── ALERTS ── */
.alert{border-radius:12px;padding:13px 14px;display:flex;gap:10px;margin-bottom:14px;align-items:flex-start}
.alert.warn{background:var(--amberBg);border:1px solid #fde68a}
.alert.danger{background:var(--redBg);border:1px solid #fca5a5}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 24px}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--ink3);line-height:1.6}

/* ── FAB ── */
.fab{width:calc(100% - 32px);margin:0 16px;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(91,95,239,.3);letter-spacing:-.2px;transition:opacity .15s}
.fab:active{opacity:.85}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,15,26,.4);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 20px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
.modal::-webkit-scrollbar{display:none}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:16px;font-weight:800;margin-bottom:18px;text-align:center;color:var(--ink);letter-spacing:-.3px}
.modal-lbl{font-size:11px;color:var(--ink3);font-weight:600;margin-bottom:6px;letter-spacing:.3px;display:block}
.modal-inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:15px;font-family:inherit;color:var(--ink);outline:none;direction:rtl;-webkit-appearance:none;margin-bottom:4px;transition:border-color .2s}
.modal-inp:focus{border-color:var(--accent);background:#fff}
.modal-sel{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;direction:rtl;-webkit-appearance:none}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.modal-cancel{flex:1;background:var(--bg);color:var(--ink2);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-save{flex:2;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.2px}
.modal-del{width:100%;background:var(--redBg);color:var(--red);border:1px solid #fca5a5;border-radius:12px;padding:13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px}

/* ── NUMPAD ── */
.np-grid{display:grid;grid-template-columns:repeat(3,1fr);border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px;background:var(--bg)}
.nk{padding:18px 0;text-align:center;font-size:22px;font-weight:600;cursor:pointer;border-left:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .1s;color:var(--ink);font-family:inherit}
.nk:active{background:var(--border)}
.nk:nth-child(3n+1){border-left:none}
.nk.spec{color:var(--accent);font-size:15px;font-weight:700}
.amount-big{text-align:center;padding:16px;font-size:46px;font-weight:900;letter-spacing:-3px;min-height:74px;color:var(--ink)}
.amount-big .cur{font-size:24px;color:var(--ink3);font-weight:400}

/* ── CAT GRID ── */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:9px 4px;border-radius:13px;border:2px solid transparent;transition:all .15s;background:transparent}
.cat-btn.sel{border-color:var(--accent);background:var(--accentBg)}
.cat-btn-ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px}
.cat-btn-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-align:center;letter-spacing:.2px}

/* ── PROJ ── */
.slider-wrap{margin-bottom:16px}
.slider-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);margin-bottom:7px;font-weight:500}
.slider-lbl span:last-child{font-weight:800;color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent)}
.proj-result{background:var(--accent);border-radius:14px;padding:18px;text-align:center;margin-top:10px;color:#fff}

/* ── TOAST ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}

/* ── LOADER ── */
.loader-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(4px)}
.loader-ring{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:13px;color:var(--ink3);font-weight:600}

/* ── PENSION HERO ── */
.pen-hero{background:linear-gradient(135deg,#0F172A,#1E3A5F);padding:22px 20px;color:#fff}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- AUTH -->
  <div id="auth-screen" class="auth-wrap">
    <div class="auth-brand">
      <div class="auth-brand-icon">📦</div>
      <div class="auth-brand-name">BOX3.0</div>
      <div class="auth-brand-sub">ניהול כספים משפחתי</div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">כניסה</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">הרשמה</button>
      </div>
      <div id="auth-error" class="auth-err"></div>
      <label class="auth-lbl">אימייל</label>
      <input class="auth-inp" id="auth-email" type="email" placeholder="mail@example.com" autocomplete="email">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, updateDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyD4qIs4VzS5CZSAaFeZL-q0cXyt9TxfMdo",
  authDomain:"box3-0.firebaseapp.com",
  projectId:"box3-0",
  storageBucket:"box3-0.firebasestorage.app",
  messagingSenderId:"702274544895",
  appId:"1:702274544895:web:e42f6237c30b95462e98ca"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
let currentUID=null,unsubscribe=null;

onAuthStateChanged(auth,user=>{
  if(user){
    currentUID=user.uid;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('main-app').style.display='flex';
    listenToData(user.uid);
  } else {
    currentUID=null;
    if(unsubscribe){unsubscribe();unsubscribe=null;}
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('main-app').style.display='none';
  }
});

window.switchAuthTab=function(tab){
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('auth-name-wrap').style.display=tab==='register'?'block':'none';
  document.getElementById('auth-submit-btn').textContent=tab==='register'?'הרשמה':'כניסה';
  document.getElementById('auth-error').style.display='none';
  window._authTab=tab;
};
window._authTab='login';

window.doAuth=async function(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  document.getElementById('auth-error').style.display='none';
  if(!email||!pass){showErr('נא למלא אימייל וסיסמה');return;}
  try{
    showLoader(true);
    if(window._authTab==='register'){
      const name=document.getElementById('auth-name').value.trim()||'המשפחה שלנו';
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      await setDoc(doc(db,'users',cred.user.uid),{
        familyName:name,checkingBalance:0,
        txns:[],incomes:[],budgets:CATS.map(c=>({n:c.n,budget:0})),
        goals:[],debts:[],funds:[],insurances:[]
      });
    } else {
      await signInWithEmailAndPassword(auth,email,pass);
    }
  } catch(e){
    showLoader(false);
    const msgs={'auth/email-already-in-use':'האימייל כבר קיים','auth/invalid-email':'אימייל לא תקין','auth/weak-password':'סיסמה חלשה מדי','auth/invalid-credential':'אימייל או סיסמה שגויים'};
    showErr(msgs[e.code]||'שגיאה: '+e.message);
  }
};

function showErr(msg){const el=document.getElementById('auth-error');el.textContent=msg;el.style.display='block';}

function listenToData(uid){
  showLoader(true);
  unsubscribe=onSnapshot(doc(db,'users',uid),snap=>{
    if(!snap.exists()){showLoader(false);return;}
    const d=snap.data();
    txns=d.txns||[];incomes=d.incomes||[];budgets=d.budgets||CATS.map(c=>({n:c.n,budget:0}));
    goals=d.goals||[];debts=d.debts||[];funds=d.funds||[];insurances=d.insurances||[];
    checkingBalance=d.checkingBalance||0;familyName=d.familyName||'';
    showLoader(false);
    const active=document.querySelector('.screen[style*="block"]');
    if(active){
      const id=active.id.replace('s-','');
      ({home:buildHome,exp:buildExp,inc:buildInc,budget:buildBudget,track:buildTrack,pension:buildPension})[id]?.();
    }
  },err=>{showLoader(false);console.error(err);});
}

async function saveToCloud(data){
  if(!currentUID)return;
  try{await updateDoc(doc(db,'users',currentUID),data);}
  catch(e){await setDoc(doc(db,'users',currentUID),Object.assign({txns,incomes,budgets,goals,debts,funds,insurances,checkingBalance},data));}
}
window.sv=async function(key,val){await saveToCloud({[key]:val});};
window.signOutUser=async function(){if(!confirm('להתנתק?'))return;await signOut(auth);};
function showLoader(show){document.getElementById('loader').style.display=show?'flex':'none';}
</script>

function buildHome(){
  const el=document.getElementById('s-home');
  const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  const daysInMonth=new Date(y,m+1,0).getDate(),daysLeft=daysInMonth-now.getDate();
  const mt=txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y;});
  const mi=incomes.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y;});
  const totE=mt.reduce((s,t)=>s+t.amt,0),totI=mi.reduce((s,t)=>s+t.amt,0),net=totI-totE;
  const totBudget=budgets.reduce((s,b)=>s+b.budget,0);

async function saveExp(){
  const amt=parseFloat(expAmt);

  if(!name)return toast('הכנס תיאור',1);
  const cat=CATS.find(c=>c.n===selCat)||CATS[0];
  txns.unshift({id:Date.now(),name,amt,cat:cat.n,ic:cat.ic,bg:cat.bg,c:cat.c,src:document.getElementById('exp-src').value,date:new Date().toLocaleDateString('he-IL')});

function openIncM(id){
  editIncId=id;const inc=id?incomes.find(x=>x.id===id):null;
  document.getElementById('inc-title').textContent=inc?'עריכת הכנסה':'הכנסה חדשה';
  document.getElementById('inc-amt').value=inc?inc.amt:'';
  document.getElementById('inc-src').value=inc?inc.src:'';
  document.getElementById('inc-date').value=inc?inc.date:'';
  document.getElementById('inc-del').style.display=inc?'block':'none';
  openM('m-inc');
}
async function saveInc(){
  const amt=parseFloat(document.getElementById('inc-amt').value);
  if(!amt||amt<=0)return toast('הכנס סכום',1);
  const src=document.getElementById('inc-src').value.trim()||'הכנסה';
  const date=document.getElementById('inc-date').value.trim()||new Date().toLocaleDateString('he-IL');
  if(editIncId){const i=incomes.findIndex(x=>x.id===editIncId);if(i>=0)incomes[i]=Object.assign({},incomes[i],{amt,src,date});}
  else incomes.unshift({id:Date.now(),amt,src,date});
  await sv('incomes',incomes);
  document.getElementById('inc-amt').value='';document.getElementById('inc-src').value='';document.getElementById('inc-date').value='';
  closeM('m-inc');buildHome();
  if(document.getElementById('s-inc').style.display!=='none')buildInc();
  toast(editIncId?'עודכן ✓':'נשמר ✓');
}
async function deleteInc(){
  if(!confirm('למחוק?'))return;
  incomes=incomes.filter(x=>x.id!==editIncId);
  await sv('incomes',incomes);closeM('m-inc');buildHome();
  if(document.getElementById('s-inc').style.display!=='none')buildInc();
  toast('נמחק ✓');
}

function buildBudget(){
  const el=document.getElementById('s-budget');
  const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  const mt=txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===m&&d.getFullYear()===y;});
  const cats={};mt.forEach(t=>{cats[t.cat]=(cats[t.cat]||0)+t.amt;});
  const totB=budgets.reduce((s,b)=>s+b.budget,0);
  const totS=Object.values(cats).reduce((s,v)=>s+v,0);
  const over=budgets.filter(b=>b.budget>0&&(cats[b.n]||0)>b.budget);
  el.innerHTML=
  '<div class="topbar"><div class="topbar-title">תקציב — '+MONTHS[m]+'</div>'+(totB>0?'<div style="font-size:12px;color:var(--ink3);font-weight:600">₪'+fmt(totS)+' / ₪'+fmt(totB)+'</div>':'')+'</div>'+
  (totB>0?'<div style="padding:12px 16px 0"><div style="height:6px;background:var(--border);border-radius:4px;overflow:hidden"><div style="height:100%;border-radius:4px;background:'+(totS>totB?'var(--red)':'var(--green)')+';width:'+Math.min(Math.round(totS/totB*100),100)+'%;transition:width 1s"></div></div></div>':'')+
  '<div style="padding:16px">'+
  (over.length?'<div class="alert danger"><span style="font-size:18px">🚨</span><div style="font-size:12px;color:var(--red);line-height:1.6"><strong>'+over.length+' קטגוריות חרגו</strong><br>'+over.map(b=>b.n+': +₪'+fmt((cats[b.n]||0)-b.budget)).join(' · ')+'</div></div>':'')+
  budgets.map(b=>{
    const spent=cats[b.n]||0,cat=CATS.find(c=>c.n===b.n)||{ic:'📦',c:'#5B5FEF',bg:'#EEF0FE'};
    const pct=b.budget>0?Math.min(Math.round(spent/b.budget*100),100):0;
    const ov=b.budget>0&&spent>b.budget;
    const bc=ov?'var(--red)':pct>80?'var(--amber)':cat.c;
    return'<div class="bud-item" onclick="openBM(\''+b.n+'\','+b.budget+')">'+
      '<div class="bud-top"><div class="bud-ico" style="background:'+cat.bg+'">'+cat.ic+'</div>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--ink)">'+b.n+'</div>'+
      '<div style="font-size:11px;color:var(--ink3);margin-top:1px">'+(b.budget>0?pct+'% מנוצל':'לחץ להגדרה')+'</div></div>'+
      '<div style="text-align:left"><div style="font-size:15px;font-weight:800;color:'+(ov?'var(--red)':cat.c)+'">₪'+fmt(spent)+'</div>'+
      '<div style="font-size:10px;color:var(--ink3);margin-top:1px">'+(b.budget>0?'/ ₪'+fmt(b.budget):'')+'</div></div></div>'+
      (b.budget>0?'<div class="bud-bar"><div class="bud-fill" style="width:'+pct+'%;background:'+bc+'"></div></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600">'+
      '<span style="color:'+(ov?'var(--red)':'var(--green)')+'">'+(ov?'⚠️ חריגה ₪'+fmt(spent-b.budget):'✓ נשאר ₪'+fmt(b.budget-spent))+'</span>'+
      '<span style="color:var(--ink3)">יעד: ₪'+fmt(b.budget)+'</span></div>':'')+
    '</div>';
  }).join('')+
  '</div>';
}

function renderTrack(){
  const el=document.getElementById('track-content');if(!el)return;
  if(trackTab==='goals'){
    el.innerHTML=(goals.length?goals.map(g=>{
      const target=parseFloat(g.target)||0,saved=parseFloat(g.saved)||0,monthly=parseFloat(g.monthly)||0;
      const pct=target>0?Math.min(Math.round(saved/target*100),100):0;
      const remain=target-saved,months=monthly>0?Math.ceil(remain/monthly):null;
      return'<div class="goal-card" onclick="openGoalM('+g.id+')">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'+
          '<div><div style="font-size:13px;font-weight:700;color:var(--ink)">'+g.name+'</div>'+
          '<div style="font-size:11px;color:var(--ink3);margin-top:2px">'+(monthly>0?'₪'+fmt(monthly)+'/חודש':'')+'</div></div>'+
          '<div style="text-align:left"><div style="font-size:15px;font-weight:800;color:var(--accent)">₪'+fmt(saved)+'</div>'+
          '<div style="font-size:10px;color:var(--ink3);margin-top:1px">מתוך ₪'+fmt(target)+'</div></div>'+
        '</div>'+
        '<div style="height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:7px">'+
          '<div style="height:100%;border-radius:4px;width:'+pct+'%;background:'+(pct>=100?'var(--green)':'var(--accent)')+';transition:width .8s ease"></div></div>'+
        '<div style="display:flex;justify-content:space-between;font-size:11px">'+
          '<span style="font-weight:700;color:'+(pct>=100?'var(--green)':'var(--ink3)')+'">🎯 '+pct+'%'+(pct>=100?' — הגעת!':'')+'</span>'+
          '<span style="color:var(--ink3)">'+(pct<100?'נשאר ₪'+fmt(remain)+(months?' · '+months+' חודשים':''):'')+'</span>'+
        '</div></div>';
    }).join(''):'<div class="card"><div class="empty"><div class="empty-ico">🎯</div><div class="empty-title">אין יעדים עדיין</div><div class="empty-sub">הגדר יעד חיסכון</div></div></div>')+
    '<button class="fab" style="margin-top:12px" onclick="openGoalM(null)">+ הוסף יעד חיסכון</button>';
  } else if(trackTab==='debts'){
    const totDebt=debts.reduce((s,d)=>s+(parseFloat(d.remain)||0),0);
    const totM=debts.reduce((s,d)=>s+(parseFloat(d.monthly)||0),0);
    el.innerHTML=
    (debts.length?'<div class="card pad" style="margin-bottom:12px;background:linear-gradient(135deg,#FEF0F0,#FFF5F5);border-color:#fca5a5">'+
      '<div style="display:flex;justify-content:space-between">'+
        '<div><div style="font-size:11px;color:var(--ink3);font-weight:600;margin-bottom:3px">סה"כ חובות</div><div style="font-size:22px;font-weight:900;color:var(--red)">₪'+fmt(totDebt)+'</div></div>'+
        '<div style="text-align:left"><div style="font-size:11px;color:var(--ink3);font-weight:600;margin-bottom:3px">תשלום חודשי</div><div style="font-size:22px;font-weight:900;color:var(--red)">₪'+fmt(totM)+'</div></div>'+
      '</div></div>':'')+
    (debts.length?debts.map(d=>{
      const total=parseFloat(d.total)||0,remain=parseFloat(d.remain)||0,monthly=parseFloat(d.monthly)||0;
      const pct=total>0?Math.round((total-remain)/total*100):0;
      const months=monthly>0?Math.ceil(remain/monthly):null;
      return'<div class="debt-card" onclick="openDebtM('+d.id+')">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
          '<div style="width:38px;height:38px;border-radius:12px;background:var(--redBg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">💳</div>'+
          '<div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--ink)">'+d.name+'</div>'+
          '<div style="font-size:11px;color:var(--ink3);margin-top:1px">'+(monthly>0?'₪'+fmt(monthly)+'/חודש':'')+(d.end?' · מסתיים '+d.end:'')+'</div></div>'+
          '<div style="text-align:left"><div style="font-size:15px;font-weight:800;color:var(--red)">₪'+fmt(remain)+'</div><div style="font-size:10px;color:var(--ink3);margin-top:1px">נותר</div></div>'+
        '</div>'+
        '<div class="debt-bar"><div class="debt-fill" style="width:'+(100-pct)+'%"></div></div>'+
        '<div style="font-size:11px;color:var(--ink3);font-weight:500">'+pct+'% שולם'+(months?' · סיום בעוד '+months+' חודשים':'')+'</div>'+
      '</div>';
    }).join(''):'<div class="card"><div class="empty"><div class="empty-ico">✅</div><div class="empty-title">אין חובות</div></div></div>')+
    '<button class="fab" style="margin-top:12px" onclick="openDebtM(null)">+ הוסף חוב / הלוואה</button>';
  } else {
    const totE=txns.reduce((s,t)=>s+t.amt,0),totI=incomes.reduce((s,t)=>s+t.amt,0);
    const cats={};txns.forEach(t=>{cats[t.cat]=(cats[t.cat]||0)+t.amt;});
    const topC=Object.entries(cats).sort((a,b)=>b[1]-a[1]),maxC=topC[0]?.[1]||1;
    const now=new Date(),mos=[];
    for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);mos.push({m:d.getMonth(),y:d.getFullYear(),label:MONTHS[d.getMonth()]});}
    const md=mos.map(x=>{
      const mt2=txns.filter(t=>{const d=new Date(t.id);return d.getMonth()===x.m&&d.getFullYear()===x.y;});
      const mi2=incomes.filter(t=>{const d=new Date(t.id);return d.getMonth()===x.m&&d.getFullYear()===x.y;});
      return{label:x.label,exp:mt2.reduce((s,t)=>s+t.amt,0),inc:mi2.reduce((s,t)=>s+t.amt,0)};
    });
    const maxV=Math.max(...md.map(d=>Math.max(d.exp,d.inc)),1);
    el.innerHTML=
    '<div class="stat-grid">'+
      '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px">💸</div><div style="font-size:10px;color:var(--ink3);font-weight:600">סה"כ הוצאות</div><div style="font-size:17px;font-weight:800;color:var(--red);margin-top:3px">'+(totE>0?'₪'+fmt(totE):'—')+'</div></div>'+
      '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px">💰</div><div style="font-size:10px;color:var(--ink3);font-weight:600">סה"כ הכנסות</div><div style="font-size:17px;font-weight:800;color:var(--green);margin-top:3px">'+(totI>0?'₪'+fmt(totI):'—')+'</div></div>'+
      '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px">🏦</div><div style="font-size:10px;color:var(--ink3);font-weight:600">חיסכון כולל</div><div style="font-size:17px;font-weight:800;color:var(--accent);margin-top:3px">'+(totI||totE?'₪'+fmt(totI-totE):'—')+'</div></div>'+
      '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px">🧾</div><div style="font-size:10px;color:var(--ink3);font-weight:600">סה"כ עסקאות</div><div style="font-size:17px;font-weight:800;color:var(--ink);margin-top:3px">'+txns.length+'</div></div>'+
    '</div>'+
    (md.some(d=>d.exp>0||d.inc>0)?
    '<div class="card pad" style="margin-bottom:14px">'+
      '<div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--ink)">6 חודשים אחרונים</div>'+
      '<div style="display:flex;gap:12px;margin-bottom:10px">'+
        '<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div><span style="font-size:10px;color:var(--ink3);font-weight:600">הכנסות</span></div>'+
        '<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:var(--red)"></div><span style="font-size:10px;color:var(--ink3);font-weight:600">הוצאות</span></div>'+
      '</div>'+
      '<div style="display:flex;align-items:flex-end;gap:6px;height:90px">'+
        md.map(d=>
          '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">'+
          '<div style="display:flex;gap:2px;align-items:flex-end;width:100%">'+
            '<div style="flex:1;border-radius:4px 4px 0 0;background:var(--green);opacity:.7;height:'+Math.round(d.inc/maxV*80)+'px;min-height:'+(d.inc>0?3:0)+'px"></div>'+
            '<div style="flex:1;border-radius:4px 4px 0 0;background:var(--red);opacity:.7;height:'+Math.round(d.exp/maxV*80)+'px;min-height:'+(d.exp>0?3:0)+'px"></div>'+
          '</div>'+
          '<div style="font-size:9px;color:var(--ink3);font-weight:600">'+d.label.slice(0,3)+'</div></div>'
        ).join('')+
      '</div>'+
    '</div>':'') +
    (topC.length?
    '<div class="card pad">'+
      '<div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--ink)">הוצאות לפי קטגוריה</div>'+
      topC.map(([cat,amt])=>{const c=CATS.find(x=>x.n===cat)||{c:'#5B5FEF'};return'<div class="bar-row"><div class="bar-lbl">'+cat+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(amt/maxC*100)+'%;background:'+c.c+'"></div></div><div class="bar-amt">₪'+fmt(amt)+'</div></div>';}).join('')+
    '</div>':'');
  }
}
function openGoalM(id){editGoalId=id;const g=id?goals.find(x=>x.id===id):null;document.getElementById('gm-title').textContent=g?'עריכת יעד':'יעד חדש';document.getElementById('gm-name').value=g?g.name:'';document.getElementById('gm-target').value=g?g.target:'';document.getElementById('gm-saved').value=g?g.saved:'';document.getElementById('gm-monthly').value=g?g.monthly:'';document.getElementById('gm-del').style.display=g?'block':'none';openM('m-goal');}
async function saveGoal(){const name=document.getElementById('gm-name').value.trim();if(!name)return toast('הכנס שם',1);const goal={id:editGoalId||Date.now(),name,target:document.getElementById('gm-target').value,saved:document.getElementById('gm-saved').value,monthly:document.getElementById('gm-monthly').value};if(editGoalId){const i=goals.findIndex(g=>g.id===editGoalId);if(i>=0)goals[i]=goal;}else goals.push(goal);await sv('goals',goals);closeM('m-goal');buildTrack();toast('יעד נשמר ✓');}
async function deleteGoal(){if(!confirm('למחוק?'))return;goals=goals.filter(g=>g.id!==editGoalId);await sv('goals',goals);closeM('m-goal');buildTrack();toast('נמחק ✓');}
function openDebtM(id){editDebtId=id;const d=id?debts.find(x=>x.id===id):null;document.getElementById('dm-title').textContent=d?'עריכת חוב':'חוב חדש';document.getElementById('dm-name').value=d?d.name:'';document.getElementById('dm-total').value=d?d.total:'';document.getElementById('dm-remain').value=d?d.remain:'';document.getElementById('dm-monthly').value=d?d.monthly:'';document.getElementById('dm-end').value=d?d.end:'';document.getElementById('dm-del').style.display=d?'block':'none';openM('m-debt');}
async function saveDebt(){const name=document.getElementById('dm-name').value.trim();if(!name)return toast('הכנס שם',1);const debt={id:editDebtId||Date.now(),name,total:document.getElementById('dm-total').value,remain:document.getElementById('dm-remain').value,monthly:document.getElementById('dm-monthly').value,end:document.getElementById('dm-end').value};if(editDebtId){const i=debts.findIndex(d=>d.id===editDebtId);if(i>=0)debts[i]=debt;}else debts.push(debt);await sv('debts',debts);closeM('m-debt');buildTrack();toast('נשמר ✓');}
async function deleteDebt(){if(!confirm('למחוק?'))return;debts=debts.filter(d=>d.id!==editDebtId);await sv('debts',debts);closeM('m-debt');buildTrack();toast('נמחק ✓');}

function buildPension(){
  const el=document.getElementById('s-pension');
  const totF=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);
  const totM=funds.reduce((s,f)=>s+(parseFloat(f.monthly)||0),0);
  const totIns=insurances.reduce((s,i)=>s+(parseFloat(i.premium)||0),0);
  el.innerHTML=
  '<div class="pen-hero">'+
    '<div style="font-size:17px;font-weight:800;margin-bottom:16px">פנסיה וביטוחים</div>'+
    '<div style="display:flex;justify-content:space-between">'+
      '<div><div style="font-size:11px;opacity:.5;margin-bottom:4px">חסכונות</div><div style="font-size:26px;font-weight:900">'+(totF>0?'₪'+fmt(totF):'—')+'</div><div style="font-size:11px;opacity:.4;margin-top:2px">'+funds.length+' קרנות</div></div>'+
      '<div style="text-align:left"><div style="font-size:11px;opacity:.5;margin-bottom:4px">הפרשה חודשית</div><div style="font-size:26px;font-weight:900;color:#86efac">'+(totM>0?'₪'+fmt(totM):'—')+'</div><div style="font-size:11px;opacity:.4;margin-top:2px">ביטוחים: ₪'+fmt(totIns)+'/חודש</div></div>'+
    '</div>'+
  '</div>'+
  '<div style="padding:16px">'+
  '<div class="tabs">'+
    '<button class="tab'+(penTab==='funds'?' active':'')+'" onclick="penTab=\'funds\';buildPension()">קרנות</button>'+
    '<button class="tab'+(penTab==='proj'?' active':'')+'" onclick="penTab=\'proj\';buildPension()">תחזית</button>'+
    '<button class="tab'+(penTab==='ins'?' active':'')+'" onclick="penTab=\'ins\';buildPension()">ביטוחים</button>'+
  '</div><div id="pen-content"></div></div>';
  renderPension();
}
function renderPension(){
  const el=document.getElementById('pen-content');if(!el)return;
  if(penTab==='funds'){
    el.innerHTML=(funds.length?funds.map(f=>
      '<div class="fund-card" onclick="openFundM('+f.id+')">'+
      '<div class="fund-top"><div class="fund-ico" style="background:'+(FUND_BG[f.type]||'#EEF0FE')+'">'+(FUND_IC[f.type]||'💰')+'</div>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--ink)">'+f.name+'</div><div style="font-size:11px;color:var(--ink3);margin-top:2px">'+f.company+' · '+f.type+'</div></div>'+
      '<div style="text-align:left"><div style="font-size:16px;font-weight:800;color:'+(FUND_C[f.type]||'var(--accent)')+'">'+(parseFloat(f.balance)>0?'₪'+fmt(parseFloat(f.balance)):'—')+'</div>'+
      (parseFloat(f.ret)>0?'<div style="font-size:11px;font-weight:700;color:var(--green);margin-top:2px">↑ '+f.ret+'%</div>':'')+'</div></div>'+
      '<div class="fund-details">'+
        '<div class="fcd"><div class="fcd-val">'+(parseFloat(f.monthly)>0?'₪'+fmt(parseFloat(f.monthly)):'—')+'</div><div class="fcd-lbl">הפרשה/חודש</div></div>'+
        '<div class="fcd"><div class="fcd-val">'+f.type+'</div><div class="fcd-lbl">סוג</div></div>'+
        '<div class="fcd"><div class="fcd-val">'+(parseFloat(f.ret)>0?f.ret+'%':'—')+'</div><div class="fcd-lbl">תשואה</div></div>'+
      '</div></div>'
    ).join(''):'<div class="card"><div class="empty"><div class="empty-ico">🏛️</div><div class="empty-title">אין קרנות עדיין</div></div></div>')+
    '<button class="fab" style="margin-top:12px" onclick="openFundM(null)">+ הוסף קרן / חיסכון</button>';
  } else if(penTab==='proj'){
    const totF=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0);
    el.innerHTML=
    '<div class="card pad">'+
      '<div style="font-size:13px;font-weight:700;margin-bottom:16px;color:var(--ink)">תחזית לפרישה</div>'+
      '<div class="slider-wrap"><div class="slider-lbl"><span>גיל נוכחי</span><span id="p-cur-v">40</span></div><input type="range" min="20" max="65" value="40" id="p-cur" oninput="calcProj()"></div>'+
      '<div class="slider-wrap"><div class="slider-lbl"><span>גיל פרישה</span><span id="p-age-v">67</span></div><input type="range" min="60" max="70" value="67" id="p-age" oninput="calcProj()"></div>'+
      '<div class="slider-wrap"><div class="slider-lbl"><span>תשואה שנתית</span><span id="p-ret-v">6%</span></div><input type="range" min="2" max="12" step="0.5" value="6" id="p-ret" oninput="calcProj()"></div>'+
      '<div class="proj-result">'+(totF>0?
        '<div style="font-size:11px;opacity:.7;margin-bottom:6px">סכום צפוי בפרישה</div>'+
        '<div style="font-size:30px;font-weight:900;letter-spacing:-1px" id="p-total">מחשב...</div>'+
        '<div style="font-size:11px;opacity:.6;margin-top:6px" id="p-sub"></div>'+
        '<div style="display:flex;justify-content:space-around;margin-top:14px">'+
          '<div style="text-align:center"><div style="font-size:13px;font-weight:700" id="p-years">—</div><div style="font-size:10px;opacity:.6;margin-top:2px">שנות חיסכון</div></div>'+
          '<div style="text-align:center"><div style="font-size:13px;font-weight:700" id="p-monthly">—</div><div style="font-size:10px;opacity:.6;margin-top:2px">קצבה/חודש</div></div>'+
          '<div style="text-align:center"><div style="font-size:13px;font-weight:700">₪'+fmt(totF)+'</div><div style="font-size:10px;opacity:.6;margin-top:2px">יתרה היום</div></div>'+
        '</div>':
        '<div style="font-size:14px;opacity:.7">הוסף קרן חיסכון לתחזית</div>')+
      '</div>'+
    '</div>';
    if(totF>0)calcProj();
  } else {
    const totIns=insurances.reduce((s,i)=>s+(parseFloat(i.premium)||0),0);
    el.innerHTML=(insurances.length?
      '<div class="card" style="margin-bottom:12px">'+
        insurances.map(i=>
          '<div class="ins-row" onclick="openInsM('+i.id+')" style="padding:12px 16px">'+
          '<div class="ins-ico" style="background:'+(INS_BG[i.type]||'#F0F2F8')+'">'+(INS_IC[i.type]||'📋')+'</div>'+
          '<div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--ink)">'+i.type+'</div>'+
          '<div style="font-size:11px;color:var(--ink3);margin-top:1px">'+i.company+(i.coverage?' · '+i.coverage:'')+'</div></div>'+
          '<div style="text-align:left"><div style="font-size:13px;font-weight:700;color:var(--ink)">'+(parseFloat(i.premium)>0?'₪'+fmt(parseFloat(i.premium))+'/חודש':'—')+'</div></div></div>'
        ).join('')+
        '<div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between">'+
        '<span style="font-size:13px;color:var(--ink3);font-weight:600">סה"כ חודשי</span>'+
        '<span style="font-size:13px;font-weight:800;color:var(--red)">₪'+fmt(totIns)+'</span></div></div>':
      '<div class="card"><div class="empty"><div class="empty-ico">🛡️</div><div class="empty-title">אין ביטוחים</div></div></div>')+
    '<button class="fab" style="margin-top:12px" onclick="openInsM(null)">+ הוסף ביטוח</button>';
  }
}
function calcProj(){const age=parseInt(document.getElementById('p-age').value),cur=parseInt(document.getElementById('p-cur').value),ret=parseFloat(document.getElementById('p-ret').value)/100;document.getElementById('p-age-v').textContent=age;document.getElementById('p-cur-v').textContent=cur;document.getElementById('p-ret-v').textContent=parseFloat(document.getElementById('p-ret').value).toFixed(1)+'%';const years=Math.max(age-cur,1),totB=funds.reduce((s,f)=>s+(parseFloat(f.balance)||0),0),totM=funds.reduce((s,f)=>s+(parseFloat(f.monthly)||0),0),r=ret/12,months=years*12,total=totB*Math.pow(1+ret,years)+totM*((Math.pow(1+r,months)-1)/r),pension=Math.round(total/300);if(document.getElementById('p-total')){document.getElementById('p-total').textContent='₪'+(total/1000).toFixed(0)+'K';document.getElementById('p-sub').textContent='קצבה חודשית משוערת: ₪'+fmt(pension);document.getElementById('p-years').textContent=years+' שנה';document.getElementById('p-monthly').textContent='₪'+fmt(pension);}}
function openFundM(id){editFundId=id;const f=id?funds.find(x=>x.id===id):null;document.getElementById('fm-title').textContent=f?'עריכת '+f.name:'קרן חדשה';document.getElementById('fm-name').value=f?f.name:'';document.getElementById('fm-company').value=f?f.company:'';document.getElementById('fm-type').value=f?f.type:'קרן פנסיה';document.getElementById('fm-balance').value=f?f.balance:'';document.getElementById('fm-monthly').value=f?f.monthly:'';document.getElementById('fm-return').value=f?f.ret:'';document.getElementById('fm-del').style.display=f?'block':'none';openM('m-fund');}
async function saveFund(){const name=document.getElementById('fm-name').value.trim();if(!name)return toast('הכנס שם',1);const fund={id:editFundId||Date.now(),name,company:document.getElementById('fm-company').value.trim(),type:document.getElementById('fm-type').value,balance:document.getElementById('fm-balance').value,monthly:document.getElementById('fm-monthly').value,ret:document.getElementById('fm-return').value};if(editFundId){const i=funds.findIndex(f=>f.id===editFundId);if(i>=0)funds[i]=fund;}else funds.push(fund);await sv('funds',funds);closeM('m-fund');buildPension();toast('נשמר ✓');}
async function deleteFund(){if(!confirm('למחוק?'))return;funds=funds.filter(f=>f.id!==editFundId);await sv('funds',funds);closeM('m-fund');buildPension();toast('נמחק ✓');}
function openInsM(id){editInsId=id;const i=id?insurances.find(x=>x.id===id):null;document.getElementById('im-title').textContent=i?'עריכת ביטוח':'ביטוח חדש';document.getElementById('im-type').value=i?i.type:'ביטוח חיים';document.getElementById('im-company').value=i?i.company:'';document.getElementById('im-premium').value=i?i.premium:'';document.getElementById('im-coverage').value=i?i.coverage:'';document.getElementById('im-del').style.display=i?'block':'none';openM('m-ins');}
async function saveIns(){const company=document.getElementById('im-company').value.trim();if(!company)return toast('הכנס חברה',1);const ins={id:editInsId||Date.now(),type:document.getElementById('im-type').value,company,premium:document.getElementById('im-premium').value,coverage:document.getElementById('im-coverage').value};if(editInsId){const i=insurances.findIndex(x=>x.id===editInsId);if(i>=0)insurances[i]=ins;}else insurances.push(ins);await sv('insurances',insurances);closeM('m-ins');buildPension();toast('נשמר ✓');}
async function deleteIns(){if(!confirm('למחוק?'))return;insurances=insurances.filter(i=>i.id!==editInsId);await sv('insurances',insurances);closeM('m-ins');buildPension();toast('נמחק ✓');}
</script>
